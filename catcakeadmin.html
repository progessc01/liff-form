<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#f7f1e8">
  <title>Cat Cake｜快速上傳作品</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --paper:#f7f1e8;
      --paper-light:#fffdf8;
      --ink:#4d3b33;
      --muted:#806d63;
      --line:#dfd2c2;
      --rose:#bf9197;
      --rose-soft:#ecd9dc;
      --green:#71816b;
      --red:#a94f4f;
      --shadow:0 16px 38px rgba(78,58,47,.10);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(84,63,51,.022) 0,
          rgba(84,63,51,.022) 1px,
          transparent 1px,
          transparent 4px
        ),
        linear-gradient(180deg,#fbf7f0 0%,var(--paper) 100%);
    }

    a{color:inherit;text-decoration:none}
    button,input{font:inherit}
    button{cursor:pointer}

    .shell{
      width:min(900px,calc(100% - 24px));
      margin:28px auto;
    }

    .panel{
      padding:28px;
      background:rgba(255,253,248,.95);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:20px;
      margin-bottom:24px;
    }

    .eyebrow{
      color:var(--rose);
      font-size:11px;
      font-weight:700;
      letter-spacing:.2em;
    }

    h1{
      margin:8px 0 7px;
      font-family:"Noto Serif TC",serif;
      font-size:36px;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      line-height:1.8;
    }

    .back{
      flex-shrink:0;
      padding:10px 15px;
      border:1px solid var(--line);
      border-radius:999px;
      background:var(--paper-light);
      font-size:14px;
      font-weight:700;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:18px;
    }

    label{font-weight:700}

    input{
      width:100%;
      padding:13px 14px;
      color:var(--ink);
      background:#fff;
      border:1px solid var(--line);
      border-radius:13px;
      outline:none;
    }

    input:focus{
      border-color:var(--rose);
      box-shadow:0 0 0 3px rgba(191,145,151,.13);
    }

    .drop-zone{
      min-height:190px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:9px;
      padding:26px;
      text-align:center;
      background:rgba(236,217,220,.28);
      border:2px dashed rgba(191,145,151,.55);
      border-radius:20px;
      transition:.2s ease;
    }

    .drop-zone.dragging{
      background:rgba(236,217,220,.58);
      border-color:var(--rose);
      transform:translateY(-2px);
    }

    .drop-icon{font-size:40px}
    .drop-title{font-size:17px;font-weight:700}
    .drop-note{color:var(--muted);font-size:13px;line-height:1.7}

    .choose-btn{
      margin-top:5px;
      padding:11px 18px;
      color:#fff;
      background:var(--ink);
      border:0;
      border-radius:999px;
      font-weight:700;
    }

    #images{display:none}

    .summary{
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin:18px 0 12px;
      padding:13px 15px;
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:14px;
    }

    .summary.show{display:flex}

    .clear-btn{
      padding:7px 11px;
      color:var(--red);
      background:#fff;
      border:1px solid rgba(169,79,79,.25);
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .preview-list{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:10px;
    }

    .preview-card{
      position:relative;
      overflow:hidden;
      aspect-ratio:1/1;
      background:#fff;
      border:1px solid var(--line);
      border-radius:13px;
    }

    .preview-card img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .remove-btn{
      position:absolute;
      top:6px;
      right:6px;
      width:27px;
      height:27px;
      display:grid;
      place-items:center;
      color:#fff;
      background:rgba(54,42,36,.72);
      border:0;
      border-radius:50%;
      font-size:15px;
    }

    .progress-panel{
      display:none;
      margin-top:22px;
      padding:18px;
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:17px;
    }

    .progress-panel.show{display:block}

    .progress-header{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      font-size:14px;
      font-weight:700;
    }

    .progress-track{
      height:11px;
      overflow:hidden;
      background:#e8ded3;
      border-radius:999px;
    }

    .progress-bar{
      width:0;
      height:100%;
      background:var(--rose);
      border-radius:999px;
      transition:width .25s ease;
    }

    .current-file{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }

    .result-list{
      display:grid;
      gap:7px;
      max-height:220px;
      margin-top:14px;
      overflow:auto;
    }

    .result-item{
      padding:9px 11px;
      border-radius:10px;
      font-size:12px;
      line-height:1.6;
    }

    .result-item.ok{
      color:#496044;
      background:#edf3e9;
    }

    .result-item.error{
      color:#8d4141;
      background:#f8eaea;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:24px;
    }

    .action-btn{
      min-height:48px;
      padding:11px 20px;
      border-radius:999px;
      font-weight:700;
    }

    .upload-btn{
      flex:1;
      color:#fff;
      background:var(--ink);
      border:1px solid var(--ink);
    }

    .upload-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .works-btn{
      color:var(--ink);
      background:#fff;
      border:1px solid var(--line);
    }

    .status{
      display:none;
      margin-top:16px;
      padding:13px 15px;
      border-radius:13px;
      line-height:1.7;
    }

    .status.show{display:block}
    .status.ok{color:#496044;background:#edf3e9}
    .status.error{color:#8d4141;background:#f8eaea}

    @media(max-width:760px){
      .shell{margin:12px auto}
      .panel{padding:21px 15px;border-radius:22px}
      .header{display:block}
      .back{display:inline-flex;margin-top:15px}
      .preview-list{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media(max-width:520px){
      h1{font-size:30px}
      .preview-list{grid-template-columns:repeat(2,minmax(0,1fr))}
      .actions{flex-direction:column}
      .action-btn{width:100%}
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="panel">
      <div class="header">
        <div>
          <div class="eyebrow">CAT CAKE · QUICK UPLOAD</div>
          <h1>快速上傳作品</h1>
          <p class="subtitle">
            輸入密碼、選擇照片、按下上傳，就完成了。
          </p>
        </div>

        <a class="back" href="catcakeindex.html">返回首頁</a>
      </div>

      <form id="uploadForm">
        <div class="field">
          <label for="adminKey">管理密碼</label>
          <input
            id="adminKey"
            type="password"
            placeholder="請輸入管理密碼"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="field">
          <label>作品照片</label>

          <div class="drop-zone" id="dropZone">
            <div class="drop-icon">☁</div>
            <div class="drop-title">一次選擇多張照片</div>
            <div class="drop-note">
              也可以直接把照片拖曳到這裡。<br>
              支援 JPG、PNG、WebP，單張建議 8MB 以下。
            </div>

            <button class="choose-btn" id="chooseBtn" type="button">
              選擇照片
            </button>

            <input
              id="images"
              type="file"
              accept="image/jpeg,image/png,image/webp"
              multiple
            >
          </div>

          <div class="summary" id="summary">
            <strong id="summaryText">已選擇 0 張照片</strong>
            <button class="clear-btn" id="clearBtn" type="button">全部清除</button>
          </div>

          <div class="preview-list" id="previewList"></div>
        </div>

        <div class="progress-panel" id="progressPanel">
          <div class="progress-header">
            <span id="progressText">準備上傳</span>
            <span id="progressPercent">0%</span>
          </div>

          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>

          <div class="current-file" id="currentFile"></div>
          <div class="result-list" id="resultList"></div>
        </div>

        <div class="actions">
          <button class="action-btn upload-btn" id="uploadBtn" type="submit">
            開始上傳
          </button>

          <a class="action-btn works-btn" href="catcakeworks.html">
            查看作品集
          </a>
        </div>

        <div class="status" id="status" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbwFq-J0r1gkmFgAkQB-5oC3Bbtz4OpK1cpMDg9XeG_Ts4loi_NYR9WabKzTpPCDSNYung/exec";

    const MAX_FILE_SIZE = 8 * 1024 * 1024;
    const ALLOWED_TYPES = [
      "image/jpeg",
      "image/png",
      "image/webp"
    ];

    const imageInput = document.getElementById("images");
    const chooseBtn = document.getElementById("chooseBtn");
    const dropZone = document.getElementById("dropZone");
    const previewList = document.getElementById("previewList");
    const summary = document.getElementById("summary");
    const summaryText = document.getElementById("summaryText");
    const clearBtn = document.getElementById("clearBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusBox = document.getElementById("status");
    const progressPanel = document.getElementById("progressPanel");
    const progressText = document.getElementById("progressText");
    const progressPercent = document.getElementById("progressPercent");
    const progressBar = document.getElementById("progressBar");
    const currentFile = document.getElementById("currentFile");
    const resultList = document.getElementById("resultList");

    let selectedFiles = [];
    let uploading = false;

    chooseBtn.addEventListener("click", () => {
      if (!uploading) imageInput.click();
    });

    imageInput.addEventListener("change", () => {
      addFiles(Array.from(imageInput.files || []));
      imageInput.value = "";
    });

    ["dragenter", "dragover"].forEach(eventName => {
      dropZone.addEventListener(eventName, event => {
        event.preventDefault();

        if (!uploading) {
          dropZone.classList.add("dragging");
        }
      });
    });

    ["dragleave", "drop"].forEach(eventName => {
      dropZone.addEventListener(eventName, event => {
        event.preventDefault();
        dropZone.classList.remove("dragging");
      });
    });

    dropZone.addEventListener("drop", event => {
      if (uploading) return;

      addFiles(
        Array.from(
          event.dataTransfer.files || []
        )
      );
    });

    clearBtn.addEventListener("click", () => {
      if (uploading) return;

      selectedFiles = [];
      renderPreviews();
      clearStatus();
    });

    document
      .getElementById("uploadForm")
      .addEventListener("submit", uploadAll);

    async function uploadAll(event) {
      event.preventDefault();

      if (uploading) return;

      const adminKey =
        document
          .getElementById("adminKey")
          .value
          .trim();

      if (!adminKey) {
        showStatus(
          "請輸入管理密碼。",
          false
        );
        return;
      }

      if (!selectedFiles.length) {
        showStatus(
          "請先選擇至少一張照片。",
          false
        );
        return;
      }

      uploading = true;
      uploadBtn.disabled = true;
      uploadBtn.textContent = "照片上傳中…";
      progressPanel.classList.add("show");
      resultList.innerHTML = "";
      clearStatus();

      let successCount = 0;
      let failCount = 0;

      for (
        let index = 0;
        index < selectedFiles.length;
        index++
      ) {
        const file = selectedFiles[index];
        const number = index + 1;

        updateProgress(
          Math.round(
            (index / selectedFiles.length) * 100
          ),
          `正在上傳 ${number} / ${selectedFiles.length}`,
          file.name
        );

        try {
          const base64 =
            await fileToBase64(file);

          /*
           * GAS 目前仍要求 title 和 category，
           * 這裡自動填入，不需要使用者輸入。
           * 前台作品集不會顯示這些內容。
           */
          const payload = {
            action: "upload",
            adminKey: adminKey,
            title: `Cat Cake 作品 ${Date.now()}_${number}`,
            category: "作品集",
            description: "",
            fileName: file.name,
            mimeType: file.type,
            base64: base64.split(",")[1]
          };

          const response =
            await fetch(
              GAS_URL,
              {
                method: "POST",
                headers: {
                  "Content-Type":
                    "text/plain;charset=utf-8"
                },
                body: JSON.stringify(payload)
              }
            );

          const data =
            await response.json();

          if (!data.ok) {
            throw new Error(
              data.message || "上傳失敗"
            );
          }

          successCount++;

          appendResult(
            `✓ ${file.name} 上傳成功`,
            true
          );

        } catch (error) {
          failCount++;

          appendResult(
            `✕ ${file.name}：${
              error.message || "上傳失敗"
            }`,
            false
          );
        }
      }

      updateProgress(
        100,
        "全部處理完成",
        `成功 ${successCount} 張，失敗 ${failCount} 張`
      );

      uploading = false;
      uploadBtn.disabled = false;
      uploadBtn.textContent = "再次上傳";

      if (failCount === 0) {
        showStatus(
          `完成，共上傳 ${successCount} 張照片。`,
          true
        );

        selectedFiles = [];
        renderPreviews();
      } else {
        showStatus(
          `完成：成功 ${successCount} 張，失敗 ${failCount} 張。`,
          false
        );
      }
    }

    function addFiles(files) {
      const validFiles = [];
      const errors = [];

      files.forEach(file => {
        if (!ALLOWED_TYPES.includes(file.type)) {
          errors.push(
            `${file.name} 格式不支援`
          );
          return;
        }

        if (file.size > MAX_FILE_SIZE) {
          errors.push(
            `${file.name} 超過 8MB`
          );
          return;
        }

        const duplicate =
          selectedFiles.some(existing =>
            existing.name === file.name &&
            existing.size === file.size &&
            existing.lastModified ===
              file.lastModified
          );

        if (!duplicate) {
          validFiles.push(file);
        }
      });

      selectedFiles =
        selectedFiles.concat(validFiles);

      renderPreviews();

      if (errors.length) {
        showStatus(
          errors.join("；"),
          false
        );
      } else if (validFiles.length) {
        showStatus(
          `已加入 ${validFiles.length} 張照片。`,
          true
        );
      }
    }

    function renderPreviews() {
      summary.classList.toggle(
        "show",
        selectedFiles.length > 0
      );

      summaryText.textContent =
        `已選擇 ${selectedFiles.length} 張照片`;

      previewList.innerHTML =
        selectedFiles
          .map((file, index) => {
            const url =
              URL.createObjectURL(file);

            return `
              <article class="preview-card">
                <img
                  src="${url}"
                  alt="照片預覽"
                  onload="URL.revokeObjectURL(this.src)"
                >

                <button
                  class="remove-btn"
                  type="button"
                  aria-label="移除照片"
                  data-index="${index}"
                >
                  ×
                </button>
              </article>
            `;
          })
          .join("");

      previewList
        .querySelectorAll(".remove-btn")
        .forEach(button => {
          button.addEventListener(
            "click",
            () => {
              if (uploading) return;

              selectedFiles.splice(
                Number(button.dataset.index),
                1
              );

              renderPreviews();
            }
          );
        });
    }

    function updateProgress(
      percent,
      text,
      fileText
    ) {
      progressBar.style.width =
        `${percent}%`;

      progressPercent.textContent =
        `${percent}%`;

      progressText.textContent =
        text;

      currentFile.textContent =
        fileText || "";
    }

    function appendResult(
      message,
      success
    ) {
      const item =
        document.createElement("div");

      item.className =
        `result-item ${
          success ? "ok" : "error"
        }`;

      item.textContent =
        message;

      resultList.appendChild(item);

      resultList.scrollTop =
        resultList.scrollHeight;
    }

    function fileToBase64(file) {
      return new Promise(
        (resolve, reject) => {
          const reader =
            new FileReader();

          reader.onload =
            () => resolve(reader.result);

          reader.onerror =
            () => reject(
              new Error("照片讀取失敗")
            );

          reader.readAsDataURL(file);
        }
      );
    }

    function showStatus(
      message,
      success
    ) {
      statusBox.textContent =
        message;

      statusBox.className =
        `status show ${
          success ? "ok" : "error"
        }`;
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }
  </script>
</body>
</html>
