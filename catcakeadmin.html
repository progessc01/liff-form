<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Cat Cake｜作品管理</title>

  <style>
    :root {
      --cream: #f6f0e7;
      --paper: #fffaf3;
      --brown: #5e4938;
      --muted: #8a725e;
      --line: #dfd1c0;
      --accent: #c89178;
      --success-bg: #edf6ed;
      --success-text: #37603c;
      --error-bg: #fff0ed;
      --error-text: #9b3f31;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--brown);
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(
          circle at top left,
          rgba(255, 255, 255, 0.9),
          transparent 36%
        ),
        linear-gradient(
          180deg,
          #faf6ef 0%,
          var(--cream) 100%
        );
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(760px, calc(100% - 28px));
      margin: 42px auto;
    }

    .panel {
      padding: 28px;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(96, 74, 55, 0.12);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 24px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 50%;
      box-shadow: 0 8px 20px rgba(96, 74, 55, 0.08);
    }

    .brand-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .brand-subtitle {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.35;
    }

    .sub {
      margin-bottom: 28px;
      color: var(--muted);
      line-height: 1.8;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    label {
      font-weight: 700;
    }

    .optional {
      margin-left: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px 15px;
      color: var(--brown);
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 145, 120, 0.14);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.7;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .preview {
      min-height: 230px;
      margin-top: 6px;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      background: #fbf5ec;
      border: 1px dashed var(--line);
      border-radius: 18px;
    }

    .preview img {
      width: 100%;
      max-height: 500px;
      display: block;
      object-fit: contain;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 22px;
      font-weight: 700;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .primary {
      color: #ffffff;
      background: var(--brown);
      border: 1px solid var(--brown);
      box-shadow: 0 10px 24px rgba(94, 73, 56, 0.18);
    }

    .soft {
      color: var(--brown);
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      line-height: 1.65;
      border-radius: 14px;
    }

    .status.show {
      display: block;
    }

    .status.ok {
      color: var(--success-text);
      background: var(--success-bg);
    }

    .status.error {
      color: var(--error-text);
      background: var(--error-bg);
    }

    @media (max-width: 620px) {
      .wrap {
        width: min(100% - 20px, 760px);
        margin: 18px auto;
      }

      .panel {
        padding: 22px 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 28px;
      }

      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .preview {
        min-height: 200px;
      }
    }
  </style>
</head>

<body>

  <main class="wrap">

    <section class="panel">

      <div class="brand">
        <div class="brand-icon">🐈</div>

        <div>
          <div class="brand-name">Cat Cake</div>
          <span class="brand-subtitle">
            HANDMADE CAKE PORTFOLIO
          </span>
        </div>
      </div>

      <h1>作品管理</h1>

      <div class="sub">
        選擇蛋糕照片並填寫作品名稱，送出後就會自動顯示在
        Cat Cake 作品集首頁。
      </div>

      <form id="uploadForm">

        <div class="grid">

          <div class="field">
            <label for="adminKey">
              管理密碼
            </label>

            <input
              id="adminKey"
              type="password"
              placeholder="請輸入管理密碼"
              required
              autocomplete="current-password"
            >
          </div>

          <div class="field">
            <label for="title">
              作品名稱
            </label>

            <input
              id="title"
              type="text"
              maxlength="60"
              placeholder="例如：庫洛米生日造型蛋糕"
              required
            >
          </div>

          <div class="field">
            <label for="description">
              作品說明
              <span class="optional">選填</span>
            </label>

            <textarea
              id="description"
              maxlength="300"
              placeholder="例如：紫色系庫洛米主題，搭配蝴蝶結與愛心裝飾。"
            ></textarea>
          </div>

          <div class="field">
            <label for="image">
              作品照片
            </label>

            <input
              id="image"
              type="file"
              accept="image/jpeg,image/png,image/webp"
              required
            >

            <div class="hint">
              支援 JPG、PNG、WebP，單張照片限制 10MB。
              建議使用清楚、光線明亮的蛋糕成品照。
            </div>

            <div class="preview" id="preview">
              尚未選擇照片
            </div>
          </div>

        </div>

        <div class="actions">

          <button
            class="btn primary"
            id="submitBtn"
            type="submit"
          >
            上傳作品
          </button>

          <a
            class="btn soft"
            href="catcakeindex.html"
          >
            返回作品集
          </a>

        </div>

        <div
          class="status"
          id="status"
          role="status"
          aria-live="polite"
        ></div>

      </form>

    </section>

  </main>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbwFq-J0r1gkmFgAkQB-5oC3Bbtz4OpK1cpMDg9XeG_Ts4loi_NYR9WabKzTpPCDSNYung/exec";

    const uploadForm =
      document.getElementById("uploadForm");

    const imageInput =
      document.getElementById("image");

    const preview =
      document.getElementById("preview");

    const statusBox =
      document.getElementById("status");

    const submitButton =
      document.getElementById("submitBtn");

    let imageBase64 = "";
    let imageMimeType = "";
    let imageFileName = "";

    imageInput.addEventListener(
      "change",
      handleImageSelection
    );

    uploadForm.addEventListener(
      "submit",
      handleUpload
    );

    async function handleImageSelection() {
      clearStatus();

      const file = imageInput.files[0];

      if (!file) {
        resetImageData();
        preview.textContent = "尚未選擇照片";
        return;
      }

      const allowedTypes = [
        "image/jpeg",
        "image/png",
        "image/webp"
      ];

      if (!allowedTypes.includes(file.type)) {
        showStatus(
          "照片格式不支援，請選擇 JPG、PNG 或 WebP。",
          false
        );

        imageInput.value = "";
        resetImageData();
        preview.textContent = "尚未選擇照片";
        return;
      }

      if (file.size > 10 * 1024 * 1024) {
        showStatus(
          "照片超過 10MB，請先縮小照片後再上傳。",
          false
        );

        imageInput.value = "";
        resetImageData();
        preview.textContent = "尚未選擇照片";
        return;
      }

      try {
        imageMimeType = file.type;
        imageFileName = file.name;
        imageBase64 = await fileToBase64(file);

        preview.innerHTML = `
          <img
            src="${imageBase64}"
            alt="蛋糕作品照片預覽"
          >
        `;
      } catch (error) {
        console.error(error);

        showStatus(
          "照片讀取失敗，請重新選擇照片。",
          false
        );

        imageInput.value = "";
        resetImageData();
        preview.textContent = "尚未選擇照片";
      }
    }

    async function handleUpload(event) {
      event.preventDefault();
      clearStatus();

      if (!GAS_URL.startsWith("http")) {
        showStatus(
          "尚未設定 GAS Web App 網址。",
          false
        );
        return;
      }

      const adminKey =
        document
          .getElementById("adminKey")
          .value
          .trim();

      const title =
        document
          .getElementById("title")
          .value
          .trim();

      const description =
        document
          .getElementById("description")
          .value
          .trim();

      if (!adminKey) {
        showStatus(
          "請輸入管理密碼。",
          false
        );
        return;
      }

      if (!title) {
        showStatus(
          "請輸入作品名稱。",
          false
        );
        return;
      }

      if (!imageBase64) {
        showStatus(
          "請先選擇一張作品照片。",
          false
        );
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "作品上傳中…";

      try {
        const payload = {
          action: "upload",

          adminKey: adminKey,

          title: title,

          /*
           * 前台已經不使用分類，
           * 但保留固定值給既有 GAS 與 Sheet，
           * 避免後台因缺少 category 欄位發生錯誤。
           */
          category: "作品集",

          description: description,

          fileName: imageFileName,

          mimeType: imageMimeType,

          base64: imageBase64.split(",")[1]
        };

        const response = await fetch(
          GAS_URL,
          {
            method: "POST",

            headers: {
              "Content-Type":
                "text/plain;charset=utf-8"
            },

            body: JSON.stringify(payload)
          }
        );

        if (!response.ok) {
          throw new Error(
            `伺服器回應錯誤：${response.status}`
          );
        }

        const data = await response.json();

        if (!data.ok) {
          throw new Error(
            data.message || "作品上傳失敗"
          );
        }

        showStatus(
          "作品已成功上傳！返回作品集並重新整理後即可看到新作品。",
          true
        );

        uploadForm.reset();

        resetImageData();

        preview.textContent =
          "尚未選擇照片";
      } catch (error) {
        console.error(error);

        showStatus(
          error.message ||
            "作品上傳失敗，請稍後再試。",
          false
        );
      } finally {
        submitButton.disabled = false;
        submitButton.textContent =
          "上傳作品";
      }
    }

    function fileToBase64(file) {
      return new Promise(
        (resolve, reject) => {
          const reader = new FileReader();

          reader.onload = () => {
            resolve(reader.result);
          };

          reader.onerror = () => {
            reject(
              new Error("照片讀取失敗")
            );
          };

          reader.readAsDataURL(file);
        }
      );
    }

    function resetImageData() {
      imageBase64 = "";
      imageMimeType = "";
      imageFileName = "";
    }

    function showStatus(message, isSuccess) {
      statusBox.textContent = message;

      statusBox.className =
        `status show ${
          isSuccess ? "ok" : "error"
        }`;
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }
  </script>

</body>
</html>
