<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#f7f1e8">
  <title>Cat Cake｜完整作品集</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --paper:#f7f1e8;
      --ink:#4d3b33;
      --muted:#806d63;
      --line:#dfd2c2;
      --rose:#bf9197;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      color:var(--ink);
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(84,63,51,.022) 0,
          rgba(84,63,51,.022) 1px,
          transparent 1px,
          transparent 4px
        ),
        linear-gradient(180deg,#fbf7f0 0%,var(--paper) 100%);
    }

    body.no-scroll{overflow:hidden}

    a{
      color:inherit;
      text-decoration:none;
    }

    button{font:inherit}

    .shell{
      width:min(1240px,calc(100% - 24px));
      margin:auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(247,241,232,.92);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(14px);
    }

    .header-inner{
      min-height:66px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .back{
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }

    .brand{
      font-family:"Noto Serif TC",serif;
      font-size:19px;
      font-weight:700;
      letter-spacing:.08em;
    }

    .upload{
      padding:9px 14px;
      color:#fff;
      background:var(--ink);
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }

    .intro{
      padding:44px 0 26px;
      text-align:center;
    }

    .intro small{
      color:var(--rose);
      font-size:11px;
      font-weight:700;
      letter-spacing:.2em;
    }

    .intro h1{
      margin:10px 0 7px;
      font-family:"Noto Serif TC",serif;
      font-size:clamp(34px,5vw,52px);
    }

    .count{
      color:var(--muted);
      font-size:13px;
    }

    .gallery-wrap{
      padding:14px 0 80px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }

    .card{
      overflow:hidden;
      aspect-ratio:1/1;
      background:#e9ded1;
      border:1px solid var(--line);
      border-radius:14px;
      cursor:pointer;
      transition:.2s ease;
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 28px rgba(78,58,47,.1);
    }

    .card img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      transition:.3s ease;
    }

    .card:hover img{
      transform:scale(1.035);
    }

    .loading,.empty{
      grid-column:1/-1;
      padding:70px 24px;
      color:var(--muted);
      text-align:center;
      border:1px dashed var(--rose);
      border-radius:18px;
    }

    .lightbox{
      position:fixed;
      inset:0;
      z-index:80;
      display:none;
      background:rgba(20,18,16,.98);
      touch-action:none;
      user-select:none;
    }

    .lightbox.open{display:block}

    .stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .viewer-image{
      max-width:none;
      max-height:none;
      width:auto;
      height:auto;
      object-fit:contain;
      transform-origin:center;
      transition:transform .16s ease;
      cursor:grab;
    }

    .viewer-image.dragging{
      cursor:grabbing;
      transition:none;
    }

    .topbar{
      position:absolute;
      top:0;
      right:0;
      left:0;
      z-index:5;
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:11px 14px;
      background:linear-gradient(180deg,rgba(0,0,0,.72),transparent);
    }

    .viewer-count{
      color:rgba(255,255,255,.76);
      font-size:13px;
    }

    .viewer-actions{
      display:flex;
      gap:7px;
    }

    .viewer-btn{
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      color:#fff;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      border-radius:50%;
      cursor:pointer;
      font-size:18px;
    }

    .nav-btn{
      position:absolute;
      top:50%;
      z-index:5;
      width:46px;
      height:62px;
      display:grid;
      place-items:center;
      transform:translateY(-50%);
      color:#fff;
      background:rgba(0,0,0,.3);
      border:1px solid rgba(255,255,255,.12);
      border-radius:13px;
      cursor:pointer;
      font-size:36px;
    }

    .prev{left:8px}
    .next{right:8px}

    @media(max-width:900px){
      .gallery{
        grid-template-columns:repeat(3,minmax(0,1fr));
      }
    }

    @media(max-width:600px){
      .upload{display:none}
      .intro{padding:34px 0 20px}
      .gallery{
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:9px;
      }
      .card{border-radius:10px}
      .nav-btn{
        width:40px;
        height:56px;
        font-size:31px;
      }
      .prev{left:4px}
      .next{right:4px}
    }
  </style>
</head>

<body>
  <header>
    <div class="shell header-inner">
      <a class="back" href="catcakeindex.html">← 返回首頁</a>
      <div class="brand">Cat Cake</div>
      <a class="upload" href="catcakeadmin.html">上傳作品</a>
    </div>
  </header>

  <main>
    <section class="intro">
      <div class="shell">
        <small>ALL CAKE STORIES</small>
        <h1>完整作品集</h1>
        <div class="count" id="workCount">作品載入中</div>
      </div>
    </section>

    <section class="gallery-wrap">
      <div class="shell">
        <div class="gallery" id="gallery">
          <div class="loading">作品載入中……</div>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox">
    <div class="stage" id="stage">
      <img class="viewer-image" id="viewerImage" alt="蛋糕作品">
    </div>

    <div class="topbar">
      <div class="viewer-count" id="viewerCount"></div>

      <div class="viewer-actions">
        <button class="viewer-btn" id="zoomOut" type="button">−</button>
        <button class="viewer-btn" id="zoomReset" type="button">1:1</button>
        <button class="viewer-btn" id="zoomIn" type="button">＋</button>
        <button class="viewer-btn" id="closeBtn" type="button">×</button>
      </div>
    </div>

    <button class="nav-btn prev" id="prevBtn" type="button">‹</button>
    <button class="nav-btn next" id="nextBtn" type="button">›</button>
  </div>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbwFq-J0r1gkmFgAkQB-5oC3Bbtz4OpK1cpMDg9XeG_Ts4loi_NYR9WabKzTpPCDSNYung/exec";

    let works = [];
    let currentIndex = 0;
    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startTranslateX = 0;
    let startTranslateY = 0;
    let touchStartX = 0;
    let touchStartY = 0;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;

    const lightbox =
      document.getElementById("lightbox");

    const stage =
      document.getElementById("stage");

    const viewerImage =
      document.getElementById("viewerImage");

    loadWorks();

    async function loadWorks() {
      try {
        const response =
          await fetch(
            `${GAS_URL}?action=list&t=${Date.now()}`,
            { cache: "no-store" }
          );

        const data =
          await response.json();

        if (!data.ok) {
          throw new Error(
            data.message || "讀取失敗"
          );
        }

        works =
          Array.isArray(data.items)
            ? data.items
            : [];

      } catch (error) {
        console.error(error);
        works = [];
      }

      renderGallery();

      document
        .getElementById("workCount")
        .textContent =
          works.length
            ? `目前共 ${works.length} 張作品`
            : "目前尚無作品";
    }

    function renderGallery() {
      const gallery =
        document.getElementById("gallery");

      if (!works.length) {
        gallery.innerHTML = `
          <div class="empty">
            目前尚無作品。
          </div>
        `;
        return;
      }

      gallery.innerHTML =
        works.map((item, index) => `
          <article
            class="card"
            tabindex="0"
            data-index="${index}"
          >
            <img
              loading="lazy"
              src="${escapeAttr(item.imageUrl || "")}"
              alt="Cat Cake 蛋糕作品"
            >
          </article>
        `).join("");

      gallery
        .querySelectorAll(".card")
        .forEach(card => {
          const open = () => {
            openViewer(
              Number(card.dataset.index)
            );
          };

          card.addEventListener(
            "click",
            open
          );

          card.addEventListener(
            "keydown",
            event => {
              if (
                event.key === "Enter" ||
                event.key === " "
              ) {
                event.preventDefault();
                open();
              }
            }
          );
        });
    }

    function openViewer(index) {
      currentIndex =
        (index + works.length) %
        works.length;

      resetTransform();
      updateViewer();

      lightbox.classList.add("open");
      document.body.classList.add("no-scroll");
    }

    function closeViewer() {
      lightbox.classList.remove("open");
      document.body.classList.remove("no-scroll");
      resetTransform();
    }

    function updateViewer() {
      const item =
        works[currentIndex];

      viewerImage.src =
        item.imageUrl || "";

      document
        .getElementById("viewerCount")
        .textContent =
          `${currentIndex + 1} / ${works.length}`;

      applyTransform();
    }

    function showPrevious() {
      currentIndex =
        (currentIndex - 1 + works.length) %
        works.length;

      resetTransform();
      updateViewer();
    }

    function showNext() {
      currentIndex =
        (currentIndex + 1) %
        works.length;

      resetTransform();
      updateViewer();
    }

    function setScale(value) {
      scale =
        Math.min(
          5,
          Math.max(1, value)
        );

      if (scale === 1) {
        translateX = 0;
        translateY = 0;
      }

      applyTransform();
    }

    function resetTransform() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    function applyTransform() {
      viewerImage.style.transform =
        `translate(${translateX}px,${translateY}px) scale(${scale})`;
    }

    function getTouchDistance(touches) {
      const dx =
        touches[0].clientX -
        touches[1].clientX;

      const dy =
        touches[0].clientY -
        touches[1].clientY;

      return Math.hypot(dx, dy);
    }

    document
      .getElementById("closeBtn")
      .addEventListener(
        "click",
        closeViewer
      );

    document
      .getElementById("prevBtn")
      .addEventListener(
        "click",
        showPrevious
      );

    document
      .getElementById("nextBtn")
      .addEventListener(
        "click",
        showNext
      );

    document
      .getElementById("zoomIn")
      .addEventListener(
        "click",
        () => setScale(scale + .25)
      );

    document
      .getElementById("zoomOut")
      .addEventListener(
        "click",
        () => setScale(scale - .25)
      );

    document
      .getElementById("zoomReset")
      .addEventListener(
        "click",
        resetTransform
      );

    stage.addEventListener(
      "wheel",
      event => {
        event.preventDefault();

        setScale(
          scale +
          (event.deltaY < 0 ? .2 : -.2)
        );
      },
      { passive: false }
    );

    viewerImage.addEventListener(
      "dblclick",
      () => {
        setScale(
          scale === 1 ? 2 : 1
        );
      }
    );

    viewerImage.addEventListener(
      "mousedown",
      event => {
        if (scale <= 1) return;

        isDragging = true;
        viewerImage.classList.add("dragging");

        dragStartX = event.clientX;
        dragStartY = event.clientY;

        startTranslateX = translateX;
        startTranslateY = translateY;

        event.preventDefault();
      }
    );

    window.addEventListener(
      "mousemove",
      event => {
        if (!isDragging) return;

        translateX =
          startTranslateX +
          (event.clientX - dragStartX);

        translateY =
          startTranslateY +
          (event.clientY - dragStartY);

        applyTransform();
      }
    );

    window.addEventListener(
      "mouseup",
      () => {
        isDragging = false;
        viewerImage.classList.remove("dragging");
      }
    );

    stage.addEventListener(
      "touchstart",
      event => {
        if (event.touches.length === 1) {
          touchStartX =
            event.touches[0].clientX;

          touchStartY =
            event.touches[0].clientY;

          if (scale > 1) {
            isDragging = true;
            dragStartX = touchStartX;
            dragStartY = touchStartY;
            startTranslateX = translateX;
            startTranslateY = translateY;
          }
        }

        if (event.touches.length === 2) {
          pinchStartDistance =
            getTouchDistance(event.touches);

          pinchStartScale =
            scale;
        }
      },
      { passive: true }
    );

    stage.addEventListener(
      "touchmove",
      event => {
        if (event.touches.length === 2) {
          event.preventDefault();

          const distance =
            getTouchDistance(event.touches);

          setScale(
            pinchStartScale *
            (
              distance /
              pinchStartDistance
            )
          );

          return;
        }

        if (
          event.touches.length === 1 &&
          scale > 1 &&
          isDragging
        ) {
          event.preventDefault();

          translateX =
            startTranslateX +
            (
              event.touches[0].clientX -
              dragStartX
            );

          translateY =
            startTranslateY +
            (
              event.touches[0].clientY -
              dragStartY
            );

          applyTransform();
        }
      },
      { passive: false }
    );

    stage.addEventListener(
      "touchend",
      event => {
        if (event.touches.length === 0) {
          if (scale === 1) {
            const changed =
              event.changedTouches[0];

            const diffX =
              changed.clientX -
              touchStartX;

            const diffY =
              changed.clientY -
              touchStartY;

            if (
              Math.abs(diffX) > 60 &&
              Math.abs(diffX) >
                Math.abs(diffY)
            ) {
              diffX < 0
                ? showNext()
                : showPrevious();
            }
          }

          isDragging = false;
        }
      },
      { passive: true }
    );

    document.addEventListener(
      "keydown",
      event => {
        if (
          !lightbox
            .classList
            .contains("open")
        ) {
          return;
        }

        if (event.key === "Escape") {
          closeViewer();
        }

        if (event.key === "ArrowLeft") {
          showPrevious();
        }

        if (event.key === "ArrowRight") {
          showNext();
        }
      }
    );

    function escapeHtml(value = "") {
      return String(value).replace(
        /[&<>'"]/g,
        character => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "'": "&#39;",
          '"': "&quot;"
        })[character]
      );
    }

    function escapeAttr(value = "") {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
