<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片查詢</title>
  <link rel="stylesheet" href="customer-style.css?v=cardfix003">
</head>

<body>

<div class="container">

  <h1>我的卡片</h1>

  <div id="memberInfo"></div>

  <br>

  <div id="cardBox">讀取中...</div>

  <br>

  <button type="button" onclick="prevPage()">上一頁</button>
  <button type="button" onclick="nextPage()">下一頁</button>

  <br><br>

  <button type="button" onclick="location.href='customer-home.html'">
    返回
  </button>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const customerName = localStorage.getItem("customerName");
const phone = localStorage.getItem("phone");

let pages = [];
let page = 0;

if(!customerName || !phone) {
  alert("請先登入會員");
  location.href = "customer-login.html";
}

document.getElementById("memberInfo").innerHTML = `
  <b>目前會員：</b>${escapeHtml(customerName)}
`;

loadCards();

function loadCards() {

  const cardBox = document.getElementById("cardBox");

  cardBox.innerHTML = "⏳ 讀取卡片中...";

  const form = new URLSearchParams();

  form.append("type", "getCustomerCards");
  form.append("customerName", customerName);
  form.append("phone", phone);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {
      cardBox.innerHTML = "❌ 查詢失敗";
      return;
    }

    const cards = data.cards || [];

    if(cards.length === 0) {
      cardBox.innerHTML = "目前尚無卡片";
      return;
    }

    const usingCards = cards.filter(c =>
      Number(c.remainingTimes) > 0 &&
      Number(c.remainingTimes) < Number(c.totalTimes)
    );

    const unusedCards = cards.filter(c =>
      Number(c.remainingTimes) === Number(c.totalTimes)
    );

    const finishedCards = cards.filter(c =>
      Number(c.remainingTimes) <= 0
    );

    pages = usingCards.concat(unusedCards).concat(finishedCards);

    page = 0;

    render();

  })
  .catch(err => {
    console.log(err);
    cardBox.innerHTML = "❌ 系統錯誤";
  });

}

function render() {

  const cardBox = document.getElementById("cardBox");

  if(pages.length === 0) {
    cardBox.innerHTML = "目前尚無卡片";
    return;
  }

  const c = pages[page];

  const cardNoRaw = c.cardNo || "";
  const cardNoDisplay = formatCardNo(cardNoRaw);

  const remainingTimes = Number(c.remainingTimes || 0);
  const totalTimes = Number(c.totalTimes || 0);
  const vehicleType = c.vehicleType || "";
  const packageType = c.packageType || "";
  const status = c.status || "";

  const disabledUse =
    remainingTimes <= 0 ||
    status === "REFUND"
      ? "disabled"
      : "";

  const statusClass =
    status === "REFUND"
      ? "status-refund"
      : remainingTimes <= 0
        ? "status-finished"
        : "status-active";

  const statusText =
    status === "REFUND"
      ? "已退款"
      : remainingTimes <= 0
        ? "已用完"
        : "可使用";

  cardBox.innerHTML = `
    <div class="card">

      <div class="vipCardWrap">

        <img
          src="vip-card.jpg?v=cardfix003"
          class="vipCardImg"
          alt="安建VIP洗車儲值卡"
        >

        <div class="vipCardNo">
          ${escapeHtml(cardNoDisplay)}
        </div>

      </div>

      <h2 class="infoMainNo">卡號：${escapeHtml(cardNoDisplay)}</h2>

      <p>剩餘次數：${remainingTimes}</p>

      <p>總次數：${totalTimes}</p>

      <p>車型：${escapeHtml(vehicleType)}</p>

      <p>服務：${escapeHtml(packageType)}</p>

      <p>狀態：<span class="${statusClass}">${statusText}</span></p>

      <p class="page-info">第 ${page + 1} 張 / 共 ${pages.length} 張</p>

      <button
        type="button"
        onclick="useCurrentCard()"
        ${disabledUse}
      >
        我要使用
      </button>

      <button
        type="button"
        onclick="viewCurrentLog()"
      >
        使用紀錄
      </button>

    </div>
  `;
}

function nextPage() {
  if(page < pages.length - 1) {
    page++;
    render();
  }
}

function prevPage() {
  if(page > 0) {
    page--;
    render();
  }
}

function useCurrentCard() {

  const c = pages[page];

  if(!c) return;

  localStorage.setItem("useCardNo", c.cardNo || "");
  localStorage.setItem("useCardStatus", c.status || "");
  localStorage.setItem("useVehicleType", c.vehicleType || "");
  localStorage.setItem("usePackageType", c.packageType || "");
  localStorage.setItem("useRemainingTimes", c.remainingTimes || "");
  localStorage.setItem("useTotalTimes", c.totalTimes || "");

  location.href = "customer-use.html";
}

function viewCurrentLog() {

  const c = pages[page];

  if(!c) return;

  localStorage.setItem("logCardNo", c.cardNo || "");
  location.href = "customer-log.html";
}

function formatCardNo(cardNo) {
  const value = String(cardNo || "").trim();

  if(value.includes("-")) {
    return value;
  }

  return value.replace(/^AJ(\d+)$/i, "AJ-$1");
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

</script>

</body>
</html>
