<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片查詢</title>
  <link rel="stylesheet" href="customer-style.css">

  <style>
    .vipCardWrap{
      position:relative;
      width:100%;
      margin-bottom:15px;
      aspect-ratio:9 / 5.4;
      overflow:hidden;
      border-radius:14px;
      background:#000;
      box-shadow:0 8px 22px rgba(0,0,0,.35);
    }

    .vipCardImg{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      border-radius:14px;
    }

    .vipCardNoLabel{
      position:absolute;
      left:7%;
      bottom:18%;
      font-size:clamp(10px, 2.3vw, 18px);
      font-weight:800;
      letter-spacing:1px;
      color:#d6b45a;
      text-shadow:0 2px 5px rgba(0,0,0,.9);
      font-family:Arial, sans-serif;
    }

    .vipCardNo{
      position:absolute;
      left:21%;
      bottom:9%;
      font-size:clamp(26px, 8vw, 72px);
      font-weight:900;
      letter-spacing:3px;
      font-family:"Arial Black","Impact",sans-serif;

      background:linear-gradient(
        180deg,
        #fff7b1 0%,
        #ffe27a 12%,
        #ffc400 28%,
        #b87900 46%,
        #fff0a3 60%,
        #d99a00 78%,
        #fff6bf 100%
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      text-shadow:
        0 1px 0 #fff3b0,
        0 2px 0 #9b6a00,
        0 4px 4px rgba(0,0,0,.75),
        0 0 12px rgba(255,200,40,.45);
    }
  </style>
</head>

<body>

<div class="container">

  <h1>我的卡片</h1>

  <div id="memberInfo"></div>

  <br>

  <div id="cardBox">讀取中...</div>

  <br>

  <button type="button" onclick="prevPage()">上一頁</button>
  <button type="button" onclick="nextPage()">下一頁</button>

  <br><br>

  <button type="button" onclick="location.href='customer-home.html'">
    返回
  </button>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const customerName = localStorage.getItem("customerName");
const phone = localStorage.getItem("phone");

let pages = [];
let page = 0;

if(!customerName || !phone) {
  alert("請先登入會員");
  location.href = "customer-login.html";
}

document.getElementById("memberInfo").innerHTML = `
  <b>目前會員：</b>${customerName}
`;

loadCards();

function loadCards() {

  const cardBox = document.getElementById("cardBox");

  cardBox.innerHTML = "⏳ 讀取卡片中...";

  const form = new URLSearchParams();

  form.append("type", "getCustomerCards");
  form.append("customerName", customerName);
  form.append("phone", phone);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {
      cardBox.innerHTML = "❌ 查詢失敗";
      return;
    }

    const cards = data.cards || [];

    if(cards.length === 0) {
      cardBox.innerHTML = "目前尚無卡片";
      return;
    }

    const usingCards = cards.filter(c =>
      Number(c.remainingTimes) > 0 &&
      Number(c.remainingTimes) < Number(c.totalTimes)
    );

    const unusedCards = cards.filter(c =>
      Number(c.remainingTimes) === Number(c.totalTimes)
    );

    const finishedCards = cards.filter(c =>
      Number(c.remainingTimes) <= 0
    );

    pages = usingCards.concat(unusedCards).concat(finishedCards);

    page = 0;

    render();

  })
  .catch(err => {
    console.log(err);
    cardBox.innerHTML = "❌ 系統錯誤";
  });

}

function render() {

  const cardBox = document.getElementById("cardBox");

  if(pages.length === 0) {
    cardBox.innerHTML = "目前尚無卡片";
    return;
  }

  const c = pages[page];

  const disabledUse =
    Number(c.remainingTimes) <= 0 ||
    c.status === "REFUND"
      ? "disabled"
      : "";

  cardBox.innerHTML = `
    <div class="card">

      <div class="vipCardWrap">

        <img
          src="vip-card.jpg"
          class="vipCardImg"
          alt="VIP洗車儲值卡"
        >

        <div class="vipCardNoLabel">
          CARD NO.
        </div>

        <div class="vipCardNo">
          ${c.cardNo || ""}
        </div>

      </div>

      <h2>卡號：${c.cardNo || ""}</h2>

      <p>剩餘次數：${c.remainingTimes || 0}</p>

      <p>總次數：${c.totalTimes || 0}</p>

      <p>車型：${c.vehicleType || ""}</p>

      <p>服務：${c.packageType || ""}</p>

      <p>狀態：${c.status || ""}</p>

      <p>第 ${page + 1} 張 / 共 ${pages.length} 張</p>

      <button
        type="button"
        onclick="useCard(
          '${c.cardNo}',
          '${c.status}',
          '${c.vehicleType}',
          '${c.packageType}',
          '${c.remainingTimes}',
          '${c.totalTimes}'
        )"
        ${disabledUse}
      >
        我要使用
      </button>

      <button
        type="button"
        onclick="viewLog('${c.cardNo}')"
      >
        使用紀錄
      </button>

    </div>
  `;
}

function nextPage() {
  if(page < pages.length - 1) {
    page++;
    render();
  }
}

function prevPage() {
  if(page > 0) {
    page--;
    render();
  }
}

function useCard(cardNo, status, vehicleType, packageType, remainingTimes, totalTimes) {

  localStorage.setItem("useCardNo", cardNo);
  localStorage.setItem("useCardStatus", status);
  localStorage.setItem("useVehicleType", vehicleType);
  localStorage.setItem("usePackageType", packageType);
  localStorage.setItem("useRemainingTimes", remainingTimes);
  localStorage.setItem("useTotalTimes", totalTimes);

  location.href = "customer-use.html";
}

function viewLog(cardNo) {
  localStorage.setItem("logCardNo", cardNo);
  location.href = "customer-log.html";
}

</script>

</body>
</html>
