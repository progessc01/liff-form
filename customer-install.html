<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>加入主畫面教學</title>

  <link rel="stylesheet"
        href="customer-style.css">

</head>
<body>

<div class="container">

  <h1>加入手機主畫面</h1>

  <div class="card">

    <h2>會員專區網址</h2>

    <input
      type="text"
      id="vipUrl"
      readonly
      value="https://progessc01.github.io/liff-form/customer-login.html"
    >

    <br><br>

    <button type="button"
            onclick="copyUrl()">
      複製網址
    </button>

  </div>

  <br>

  <div class="card"
       style="text-align:left;">

    <h2>iPhone 教學</h2>

    <p>
      1. 請使用 Safari 開啟會員專區
    </p>

    <p>
      2. 點下方「分享」按鈕
    </p>

    <p>
      3. 選擇「加入主畫面」
    </p>

  </div>

  <br>

  <div class="card"
       style="text-align:left;">

    <h2>Android 教學</h2>

    <p>
      1. 請使用 Chrome 開啟會員專區
    </p>

    <p>
      2. 點右上角「⋮」
    </p>

    <p>
      3. 選擇「安裝應用程式」
      或「加入主畫面」
    </p>

  </div>

  <br>

  <button type="button"
          onclick="location.href='customer-home.html'">
    返回會員中心
  </button>

</div>

<script>

function copyUrl() {

  const input =
    document.getElementById("vipUrl");

  input.select();

  input.setSelectionRange(0, 99999);

  navigator.clipboard.writeText(input.value);

  alert("已複製會員專區網址");

}

</script>

</body>
</html>
