<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>使用紀錄</title>
  <link rel="stylesheet" href="customer-style.css">
</head>
<body>

<div class="container">

  <h1>使用紀錄</h1>

  <div id="content">讀取中...</div>

  <br>

  <button type="button" onclick="location.href='customer-cards.html'">
    返回卡片
  </button>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const cardNo = localStorage.getItem("logCardNo");
const customerName = localStorage.getItem("customerName");
const phone = localStorage.getItem("phone");

const content = document.getElementById("content");

if(!customerName || !phone) {
  alert("請先登入會員");
  location.href = "customer-login.html";
}

if(!cardNo) {
  alert("沒有選擇卡片");
  location.href = "customer-cards.html";
}

loadLog();

function loadLog() {

  content.innerHTML = "⏳ 讀取使用紀錄中...";

  const form = new URLSearchParams();

  form.append("type", "getCardLogs");
  form.append("cardNo", cardNo);
  form.append("customerName", customerName);
  form.append("phone", phone);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "NOT_OWNER") {
      content.innerHTML = "❌ 此卡片不屬於目前會員";
      return;
    }

    if(data.status !== "OK") {
      content.innerHTML = "❌ 查詢失敗";
      return;
    }

    const logs = data.logs || [];

    if(logs.length === 0) {
      content.innerHTML = `
        <div class="card">
          <h2>卡號：${escapeHtml(cardNo)}</h2>
          <p>尚無使用紀錄</p>
        </div>
      `;
      return;
    }

    let html = `
      <div class="card">
        <h2>卡號：${escapeHtml(cardNo)}</h2>
        <h3>使用紀錄</h3>
      </div>
    `;

    logs.forEach((log, index) => {

      html += `
        <div class="card" style="text-align:left;">
          <h3>第 ${index + 1} 次使用</h3>

          <p><b>核銷時間：</b>${formatTime(log.time)}</p>
          <p><b>核銷分店：</b>${escapeHtml(log.redeemStore || "")} ${escapeHtml(log.redeemStoreName || "")}</p>
          <p><b>核銷人員：</b>${escapeHtml(log.staffAccount || "")}</p>
          <p><b>使用前次數：</b>${escapeHtml(log.beforeTimes || "")}</p>
          <p><b>扣除次數：</b>${escapeHtml(log.usedTimes || "")}</p>
          <p><b>剩餘次數：</b>${escapeHtml(log.afterTimes || "")}</p>
          <p><b>備註：</b>${escapeHtml(log.note || "")}</p>
        </div>
      `;
    });

    content.innerHTML = html;

  })
  .catch(err => {
    console.log(err);
    content.innerHTML = "❌ 系統錯誤";
  });
}

function formatTime(value) {

  if(!value) return "未記錄";

  if(typeof value === "string") {

    const trimmed = value.trim();

    if(!trimmed) return "未記錄";

    if(
      trimmed.includes("上午") ||
      trimmed.includes("下午") ||
      trimmed.includes("晚上")
    ) {
      return trimmed;
    }
  }

  const d = new Date(value);

  if(isNaN(d.getTime())) {
    return String(value || "未記錄");
  }

  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const hour = String(d.getHours()).padStart(2, "0");
  const minute = String(d.getMinutes()).padStart(2, "0");
  const second = String(d.getSeconds()).padStart(2, "0");

  return `${year}/${month}/${day} ${hour}:${minute}:${second}`;
}

function escapeHtml(value) {

  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

</script>

</body>
</html>
