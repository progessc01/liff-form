<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員登入</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>安建洗車 會員登入</h1>

  <input type="text" id="account" placeholder="帳號">
  <br><br>

  <input type="password" id="password" placeholder="密碼">
  <br><br>

  <button onclick="loginCustomer()">
  登入
</button>

<br><br>

<button onclick="location.href='customer-register.html'">
  註冊
</button>

</div>

<script>
function login() {

  const acc = document.getElementById("account").value;
  const pw = document.getElementById("password").value;

  // 先做假登入（之後你再接後端）
  if(acc && pw) {
    localStorage.setItem("user", acc);
    location.href = "customer-home.html";
  } else {
    alert("請輸入帳號密碼");
  }
}
</script>

</body>
</html>
