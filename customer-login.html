<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>會員登入</title>

  <link rel="stylesheet" href="customer-style.css">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f75bc">
  <link rel="apple-touch-icon" href="ajlogo.jpg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="安建VIP">
</head>

<body>

<div class="container">

  <h1>會員登入</h1>

  <input
    type="text"
    id="customerName"
    placeholder="請輸入姓名"
    autocomplete="name"
  >

  <br><br>

  <div style="position:relative;">

    <input
      type="password"
      id="password"
      placeholder="請輸入會員密碼"
      autocomplete="current-password"
      inputmode="text"
      style="
        width:100%;
        box-sizing:border-box;
        padding-right:48px;
      "
    >

    <button
      type="button"
      id="togglePasswordBtn"
      onclick="togglePassword()"
      style="
        position:absolute;
        right:12px;
        top:50%;
        transform:translateY(-50%);
        width:28px;
        height:28px;
        border:none;
        background:transparent;
        box-shadow:none;
        padding:0;
        margin:0;
        font-size:18px;
        line-height:28px;
        cursor:pointer;
      "
    >👁️</button>

  </div>

  <br><br>

  <button type="button" id="loginBtn" onclick="loginCustomer()">
    登入
  </button>

  <br><br>

  <button type="button" onclick="location.href='customer-register.html'">
    註冊
  </button>

  <br><br>

  <button type="button" onclick="location.href='forgot-password.html'">
    忘記密碼
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

let isLoggingIn = false;

function togglePassword() {

  const input = document.getElementById("password");
  const btn = document.getElementById("togglePasswordBtn");

  if(input.type === "password") {
    input.type = "text";
    btn.innerText = "🙈";
  } else {
    input.type = "password";
    btn.innerText = "👁️";
  }
}

function loginCustomer() {

  if(isLoggingIn) return;

  const name = document.getElementById("customerName").value.trim();
  const password = document.getElementById("password").value.trim();
  const result = document.getElementById("result");
  const loginBtn = document.getElementById("loginBtn");

  if(!name || !password) {
    alert("請輸入姓名與會員密碼");
    return;
  }

  if(password.length < 8) {
    alert("密碼至少需8位");
    return;
  }

  isLoggingIn = true;
  loginBtn.disabled = true;
  loginBtn.innerText = "登入中...";

  result.innerHTML = "";

  const form = new URLSearchParams();

  form.append("type", "loginCustomer");
  form.append("name", name);
  form.append("password", password);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => {
    console.log(t);
    return JSON.parse(t);
  })
  .then(data => {

    if(data.status !== "OK") {
      result.innerHTML = "❌ 姓名或密碼錯誤";
      resetLoginButton();
      return;
    }

    localStorage.setItem("customerName", data.name);
    localStorage.setItem("phone", data.phone);

    location.href = "customer-home.html";

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "❌ 登入失敗，請稍後再試";
    resetLoginButton();
  });

}

function resetLoginButton() {
  const loginBtn = document.getElementById("loginBtn");

  isLoggingIn = false;
  loginBtn.disabled = false;
  loginBtn.innerText = "登入";
}

</script>

</body>
</html>
