<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我要取卡</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>我要取卡</h1>

  <div id="memberInfo"></div>

  <br>

  <input type="text" id="cardNo" placeholder="請輸入取卡代碼">

  <br><br>

  <button onclick="redeemCard()">
    確認取卡
  </button>

  <button onclick="location.href='customer-home.html'">
    返回首頁
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const customerName = localStorage.getItem("customerName");
const phoneLast3 = localStorage.getItem("phoneLast3");

if(!customerName || !phoneLast3) {

  alert("請先登入會員");

  location.href = "customer-login.html";
}

document.getElementById("memberInfo").innerHTML = `
  <b>目前會員：</b>${customerName}
`;

function redeemCard() {

  const cardNo = document.getElementById("cardNo").value.trim().toUpperCase();

  const result = document.getElementById("result");

  if(!cardNo) {

    alert("請輸入取卡代碼");

    return;
  }

  result.innerHTML = "⏳ 取卡中...";

  const form = new URLSearchParams();

  form.append("type", "bindCard");

  form.append("customerName", customerName);

  form.append("phoneLast3", phoneLast3);

  form.append("cardNo", cardNo);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "NOT_FOUND") {

      result.innerHTML = "❌ 查無此卡號";

      return;
    }

    if(data.status === "ALREADY_BIND") {

      result.innerHTML = "❌ 此卡片已被綁定";

      return;
    }

    if(data.status !== "OK") {

      result.innerHTML = "❌ 取卡失敗";

      return;
    }

    result.innerHTML = `
      <div style="
        background:white;
        padding:20px;
        border-radius:12px;
      ">

        <h2>✅ 取卡成功</h2>

        <p><b>卡號：</b>${data.cardNo}</p>

        <p><b>剩餘次數：</b>${data.remainingTimes}</p>

      </div>
    `;

  })
  .catch(err => {

    console.log(err);

    result.innerHTML = "❌ 系統錯誤";

  });

}

</script>

</body>
</html>
