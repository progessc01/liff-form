<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我要取卡</title>
  <link rel="stylesheet" href="customer-style.css">
</head>
<body>

<div class="container">

  <h1>我要取卡</h1>

  <div id="memberInfo" class="member-title"></div>

  <br>
<div class="info-box" style="text-align:left;">
 <br>

<b>VIP卡退款規則</b>

<br><br>

1. VIP卡退款金額將依本公司實際收款金額計算。

<br>

2. 已使用服務價值不予退還。

<br>

3. 金流手續費、發票稅費及其他已發生之必要成本不予退還。

<br>

4. 實際退款金額以系統計算結果為準。

<br>

5. 完成取卡即視為同意上述規則。

</div>

<br>

  <input type="text" id="cardNo" placeholder="請輸入取卡代碼">

  <br><br>

  <button type="button" onclick="redeemCard()">
    確認取卡
  </button>

  <button type="button" onclick="location.href='customer-home.html'">
    返回首頁
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const customerName = localStorage.getItem("customerName");
const phone = localStorage.getItem("phone");

if(!customerName || !phone) {
  alert("請先登入會員");
  location.href = "customer-login.html";
}

document.getElementById("memberInfo").innerHTML = `
  親愛的 ${customerName} 先生/小姐<br>
您好，感謝您支持安建快速洗車。
`;

function redeemCard() {

  const cardNo = document.getElementById("cardNo").value.trim().toUpperCase();
  const result = document.getElementById("result");

  if(!cardNo) {
    alert("請輸入取卡代碼");
    return;
  }

  result.innerHTML = "⏳ 取卡中...";

  const form = new URLSearchParams();

  form.append("type", "bindCard");
  form.append("customerName", customerName);
  form.append("phone", phone);
  form.append("cardNo", cardNo);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "NOT_FOUND") {
      result.innerHTML = `
        <div class="card">
          <h2>❌ 查無此卡號</h2>
          <p>請確認取卡代碼是否正確。</p>
        </div>
      `;
      return;
    }

    if(data.status === "ALREADY_BIND") {
      result.innerHTML = `
        <div class="card">
          <h2>❌ 此卡片已被綁定</h2>
          <p>如有疑問請洽門市人員。</p>
        </div>
      `;
      return;
    }

    if(data.status !== "OK") {
      result.innerHTML = `
        <div class="card">
          <h2>❌ 取卡失敗</h2>
          <p>請稍後再試，或洽門市人員協助。</p>
        </div>
      `;
      return;
    }

    result.innerHTML = `
      <div class="card">
        <h2>✅ 取卡成功</h2>

        <p><b>卡號：</b>${data.cardNo}</p>

        <p><b>剩餘次數：</b>${data.remainingTimes}</p>

        <p class="small-text">
          您可以回到會員中心查看卡片。
        </p>
      </div>
    `;

  })
  .catch(err => {
    console.log(err);

    result.innerHTML = `
      <div class="card">
        <h2>❌ 系統錯誤</h2>
        <p>請稍後再試。</p>
      </div>
    `;
  });

}

</script>

</body>
</html>
