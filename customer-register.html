<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員註冊</title>
  <link rel="stylesheet" href="customer-style.css">
</head>
<body>

<div class="container">

  <h1>會員註冊</h1>

  <input type="text" id="customerName" placeholder="請輸入姓名" required>

  <br><br>

  <input type="tel" id="phone" placeholder="請輸入手機號碼" autocomplete="tel" required>

  <br><br>

  <input type="email" id="email" placeholder="請輸入Email（忘記密碼使用）" autocomplete="email" required>

  <br><br>

  <input type="password" id="password" placeholder="請輸入8位以上英數密碼" autocomplete="new-password" inputmode="text" required>

  <br><br>

  <input type="password" id="passwordConfirm" placeholder="請再次輸入密碼" autocomplete="new-password" inputmode="text" required>

  <br><br>

  <input type="text" id="plate1" placeholder="第一台車牌號碼（必填）" required>

  <br><br>

  <input type="text" id="plate2" placeholder="第二台車牌號碼（選填）">

  <br><br>

  <input type="text" id="plate3" placeholder="第三台車牌號碼（選填）">

  <br><br>

  <input type="text" id="plate4" placeholder="第四台車牌號碼（選填）">

  <br><br>

  <input type="text" id="plate5" placeholder="第五台車牌號碼（選填）">

  <br><br>

  <button type="button" id="registerBtn" onclick="registerCustomer()">註冊</button>

  <button type="button" onclick="location.href='customer-login.html'">返回登入</button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

let isRegistering = false;

function normalizePlate(p) {
  return (p || "")
    .toUpperCase()
    .replace(/-/g, "")
    .replace(/\s/g, "");
}

function cleanPhone(p) {
  return String(p || "")
    .trim()
    .replace(/\s/g, "");
}

function resetRegisterButton() {
  isRegistering = false;
  const btn = document.getElementById("registerBtn");
  btn.disabled = false;
  btn.innerText = "註冊";
}

function clearRegisterForm() {
  document.getElementById("customerName").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";
  document.getElementById("passwordConfirm").value = "";
  document.getElementById("plate1").value = "";
  document.getElementById("plate2").value = "";
  document.getElementById("plate3").value = "";
  document.getElementById("plate4").value = "";
  document.getElementById("plate5").value = "";
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function registerCustomer() {

  if(isRegistering) return;

  const name = document.getElementById("customerName").value.trim();
  const phone = cleanPhone(document.getElementById("phone").value);
  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();
  const passwordConfirm = document.getElementById("passwordConfirm").value.trim();

  const plate1 = normalizePlate(document.getElementById("plate1").value);
  const plate2 = normalizePlate(document.getElementById("plate2").value);
  const plate3 = normalizePlate(document.getElementById("plate3").value);
  const plate4 = normalizePlate(document.getElementById("plate4").value);
  const plate5 = normalizePlate(document.getElementById("plate5").value);

  const result = document.getElementById("result");

  if(!name || !phone || !email || !password || !passwordConfirm || !plate1) {
    alert("請填寫姓名、手機號碼、Email、密碼與第一台車牌");
    return;
  }

  if(!isValidEmail(email)) {
    alert("請輸入正確的Email格式");
    return;
  }

  if(password.length < 8) {
    alert("密碼必須為8位以上");
    return;
  }

  if(password !== passwordConfirm) {
    alert("兩次輸入的密碼不一致");
    return;
  }

  isRegistering = true;

  const btn = document.getElementById("registerBtn");
  btn.disabled = true;
  btn.innerText = "註冊中...";

  result.innerHTML = "⏳ 註冊中...";

  const form = new URLSearchParams();

  form.append("type", "registerCustomer");
  form.append("name", name);
  form.append("phone", phone);
  form.append("email", email);
  form.append("password", password);
  form.append("plate1", plate1);
  form.append("plate2", plate2);
  form.append("plate3", plate3);
  form.append("plate4", plate4);
  form.append("plate5", plate5);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "EXIST") {
      result.innerHTML = "❌ 此會員已存在";
      resetRegisterButton();
      return;
    }

    if(data.status === "PASSWORD_ERROR") {
      result.innerHTML = "❌ 密碼必須為8位以上";
      resetRegisterButton();
      return;
    }

    if(data.status === "EMAIL_ERROR") {
      result.innerHTML = "❌ Email格式錯誤";
      resetRegisterButton();
      return;
    }

    if(data.status !== "OK") {
      result.innerHTML = "❌ 註冊失敗";
      resetRegisterButton();
      return;
    }

    clearRegisterForm();
    resetRegisterButton();

    result.innerHTML = `
      <div class="card">
        <h2>✅ 註冊成功</h2>
        <p><b>姓名：</b>${data.name}</p>
        <p><b>手機：</b>${data.phone}</p>
        <p><b>Email：</b>${data.email || email}</p>
        <p><b>車牌：</b>${data.plate1}</p>
        <p style="color:red; font-weight:bold;">
          請重新登入會員系統
        </p>
      </div>
    `;

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "❌ 系統錯誤";
    resetRegisterButton();
  });

}

</script>

</body>
</html>
