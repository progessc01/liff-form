<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員註冊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>會員註冊</h1>

  <input 
    type="text" 
    id="customerName" 
    placeholder="請輸入姓名"
    required
  >

  <br><br>

  <input 
    type="password" 
    id="phoneLast3" 
    placeholder="請輸入手機末三碼"
    required
  >

  <br><br>

  <input 
    type="password" 
    id="phoneLast3Confirm" 
    placeholder="請再次輸入手機末三碼"
    required
  >

  <br><br>

  <button type="button" onclick="registerCustomer()">
    註冊
  </button>

  <button type="button" onclick="location.href='customer-login.html'">
    返回登入
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function registerCustomer() {

  const name = document.getElementById("customerName").value.trim();

  const phoneLast3 = document.getElementById("phoneLast3").value.trim();

  const phoneLast3Confirm = document.getElementById("phoneLast3Confirm").value.trim();

  const result = document.getElementById("result");

  // 必填檢查
  if(!name || !phoneLast3 || !phoneLast3Confirm) {

    alert("請填寫完整資料");

    return;
  }

  // 確認密碼一致
  if(phoneLast3 !== phoneLast3Confirm) {

    alert("兩次輸入的手機末三碼不一致");

    return;
  }

  result.innerHTML = "⏳ 註冊中...";

  const form = new URLSearchParams();

  form.append("type", "registerCustomer");

  form.append("name", name);

  form.append("phoneLast3", phoneLast3);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "EXIST") {

      result.innerHTML = "❌ 此會員已存在";

      return;
    }

    if(data.status !== "OK") {

      result.innerHTML = "❌ 註冊失敗";

      return;
    }

    result.innerHTML = `
      <div style="
        background:white;
        padding:20px;
        border-radius:12px;
      ">
        <h2>✅ 註冊成功</h2>

        <p><b>姓名：</b>${data.name}</p>

        <p style="color:red; font-weight:bold;">
          請重新登入會員系統
        </p>
      </div>
    `;

  })
  .catch(err => {

    console.log(err);

    result.innerHTML = "❌ 系統錯誤";

  });

}

</script>

</body>
</html>
