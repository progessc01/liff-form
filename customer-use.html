<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我要使用</title>
  <link rel="stylesheet" href="customer-style.css">
</head>
<body>

<div class="container">

  <h1>我要使用</h1>

  <div id="content">讀取中...</div>

  <br>

  <button type="button" onclick="location.href='customer-cards.html'">
    返回卡片
  </button>

</div>

<script>

const cardNo = localStorage.getItem("useCardNo");
const vehicleType = localStorage.getItem("useVehicleType");
const packageType = localStorage.getItem("usePackageType");
const remainingTimes = localStorage.getItem("useRemainingTimes");
const totalTimes = localStorage.getItem("useTotalTimes");
const customerName = localStorage.getItem("customerName");
const phone = localStorage.getItem("phone");
const cardStatus = localStorage.getItem("useCardStatus");

const content = document.getElementById("content");

if(cardStatus === "REFUND") {

  content.innerHTML = `
    <div class="card">
      <h2>此卡已退款</h2>

      <p style="color:red;">
        已退款卡片無法使用
      </p>
    </div>
  `;

  throw new Error("REFUND CARD");
}

if(!customerName || !phone) {
  alert("請先登入會員");
  location.href = "customer-login.html";
}

if(!cardNo) {
  alert("沒有選擇卡片");
  location.href = "customer-cards.html";
}

const useUrl =
  "https://progessc01.github.io/liff-form/vip-use.html?cardNo=" +
  encodeURIComponent(cardNo);

const qrUrl =
  "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
  encodeURIComponent(useUrl);

content.innerHTML = `
  <div class="card">

    <h2>卡號：${cardNo}</h2>

    <div style="
      background:rgba(0,217,255,0.12);
      border:2px solid #00d9ff;
      border-radius:16px;
      padding:16px;
      margin:18px 0;
      text-align:center;
    ">
      <div style="font-size:16px; color:#9fdfff;">
        本卡適用車型
      </div>

      <div style="
        font-size:34px;
        font-weight:bold;
        color:#ffffff;
        margin-top:6px;
      ">
        ${vehicleType || "未設定"}
      </div>

      <hr style="border-color:rgba(255,255,255,0.2);">

      <div style="font-size:16px; color:#9fdfff;">
        使用服務
      </div>

      <div style="
        font-size:28px;
        font-weight:bold;
        color:#f7d774;
        margin-top:6px;
        line-height:1.4;
      ">
        ${packageType || "未設定"}
      </div>
    </div>

    <p><b>剩餘次數：</b>${remainingTimes || ""} / ${totalTimes || ""}</p>

    <p style="font-weight:bold; color:#ffcc00;">
      請店員確認車型與服務後再掃描核銷
    </p>

    <div style="
      text-align:center;
      margin-top:20px;
      margin-bottom:18px;
    ">

      <div style="
        font-size:18px;
        font-weight:bold;
        margin-bottom:12px;
        color:#ffffff;
      ">
        請出示此 QR Code
      </div>

      <img
        src="${qrUrl}"
        width="240"
        style="
          display:block;
          margin:0 auto;
          background:#ffffff;
          padding:10px;
          border-radius:12px;
          box-shadow:0 4px 15px rgba(0,0,0,0.3);
        "
      >

    </div>

    <p style="font-size:14px; color:#ccc;">
      此畫面僅供現場使用，請勿提供給他人
    </p>

  </div>
`;

</script>

</body>
</html>
