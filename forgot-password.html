<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘記密碼</title>
  <link rel="stylesheet" href="customer-style.css">
</head>
<body>

<div class="container">

  <h1>忘記密碼</h1>

  <p class="small-text">
    請輸入註冊時的姓名、手機號碼與 Email。系統會寄送一組臨時新密碼給您。
  </p>

  <input type="text" id="customerName" placeholder="請輸入姓名">

  <br><br>

  <input type="tel" id="phone" placeholder="請輸入手機號碼" autocomplete="tel">

  <br><br>

  <input type="email" id="email" placeholder="請輸入Email" autocomplete="email">

  <br><br>

  <button type="button" id="resetBtn" onclick="resetPassword()">
    寄送臨時密碼
  </button>

  <button type="button" onclick="location.href='customer-login.html'">
    返回登入
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

let isResetting = false;

function cleanPhone(p) {
  return String(p || "")
    .trim()
    .replace(/\s/g, "");
}

function resetButton() {
  isResetting = false;

  const btn = document.getElementById("resetBtn");
  btn.disabled = false;
  btn.innerText = "寄送臨時密碼";
}

function resetPassword() {

  if(isResetting) return;

  const name = document.getElementById("customerName").value.trim();
  const phone = cleanPhone(document.getElementById("phone").value);
  const email = document.getElementById("email").value.trim().toLowerCase();

  const result = document.getElementById("result");

  if(!name || !phone || !email) {
    alert("請輸入姓名、手機號碼與Email");
    return;
  }

  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert("請輸入正確的Email格式");
    return;
  }

  if(!confirm("確認要重設密碼並寄送臨時密碼嗎？")) {
    return;
  }

  isResetting = true;

  const btn = document.getElementById("resetBtn");
  btn.disabled = true;
  btn.innerText = "寄送中...";

  result.innerHTML = "⏳ 處理中...";

  const form = new URLSearchParams();

  form.append("type", "resetCustomerPassword");
  form.append("name", name);
  form.append("phone", phone);
  form.append("email", email);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "NOT_FOUND") {
      result.innerHTML = "❌ 查無符合的會員資料";
      resetButton();
      return;
    }

    if(data.status === "EMAIL_ERROR") {
      result.innerHTML = "❌ Email格式錯誤";
      resetButton();
      return;
    }

if(data.status === "TOO_SOON") {
  result.innerHTML = "⚠️ 5分鐘內不可重複申請，請稍後再試";
  resetButton();
  return;
}

    if(data.status !== "OK") {
      result.innerHTML = "❌ 寄送失敗：" + (data.message || "");
      resetButton();
      return;
    }

    result.innerHTML = `
      <div class="card">
        <h2>✅ 臨時密碼已寄出</h2>
        <p>請至您的Email信箱查看新密碼。</p>
        <p class="small-text">
          登入後，請到「修改會員資料」重新設定自己的密碼。
        </p>
      </div>
    `;

    resetButton();

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "❌ 系統錯誤，請稍後再試";
    resetButton();
  });

}

</script>

</body>
</html>
