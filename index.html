<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安建快速洗車問卷</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      max-width:400px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    select, textarea, button{
      width:100%;
      margin-top:10px;
      padding:10px;
    }

    button{
      background:#06C755;
      color:white;
      border:none;
    }

    #result{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🚗 安建快速洗車</h2>

  <div>整體滿意度</div>

  <select id="score">
    <option value="">請選擇</option>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
  </select>

  <div>建議</div>

  <textarea id="msg"></textarea>

  <button onclick="submitForm()">
    送出
  </button>

  <div id="result"></div>

</div>

<script>

function submitForm(){

  const score =
    document.getElementById("score").value;

  const msg =
    document.getElementById("msg").value;

  document.getElementById("result").innerHTML =
    "已送出（目前只是測試）";

  console.log(score);
  console.log(msg);
}

</script>

</body>
</html>
