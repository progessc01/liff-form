<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安建快速洗車問卷</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      max-width:400px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    select, textarea, button{
      width:100%;
      margin-top:10px;
      padding:10px;
    }

    button{
      background:#06C755;
      color:white;
      border:none;
      cursor:pointer;
    }

    #result{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🚗 安建快速洗車問卷</h2>

  <div>1️⃣ 本次洗車整體滿意度
⭐ 1～5分
（非常不滿意 → 非常滿意） *</div>
  <select id="q1">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>2️⃣ 車輛清潔效果是否符合期待？
⭐ 1～5分
（例如：車身、輪框、玻璃清潔程度）</div>
  <select id="q2">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>3️⃣ 服務人員態度與說明是否良好？
⭐ 1～5分
（態度、說明清楚度、禮貌）</div>
  <select id="q3">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>4️⃣ 整體等待時間是否能接受？
⭐ 1～5分
（是否覺得太久或流程順暢）</div>
  <select id="q4">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>  5️⃣  介紹是否簡單明確
⭐ 1～5分    </div>
  <select id="q5">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  <div>6️⃣ 車牌號碼 *</div>

<div style="display:flex; gap:10px; align-items:center;">

  <input type="text" id="plate" placeholder="例如：ABC-1234" style="flex:1;" />

  <button type="button" onclick="findCoupon()">
    找回CODE
  </button>

</div>

  <div>7️⃣ 提供您寶貴的建議，(有疑問的話)留下您聯絡方式，我們會盡快聯絡您!（選填）</div>
  <textarea id="q6"></textarea>

  <button type="button" onclick="submitForm()">送出問卷</button>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function submitForm(){

  const plate = document.getElementById("plate").value;
  const q1 = document.getElementById("q1").value;
  const q2 = document.getElementById("q2").value;
  const q3 = document.getElementById("q3").value;
  const q4 = document.getElementById("q4").value;
  const q5 = document.getElementById("q5").value;
  const q6 = document.getElementById("q6").value;

  const result = document.getElementById("result");
 // 🚨 必填檢查（前五題 + 車牌）
  if(!plate || !q1 || !q2 || !q3 || !q4 || !q5){
    result.style.color = "red";
    result.innerHTML = "⚠️ 請完成所有必填項目";
    return;
  }
 result.style.color = "black";

  result.innerHTML = "⏳ 處理中...";

  const form = new URLSearchParams();
  form.append("type","survey");
  form.append("plate",plate);
  form.append("q1",q1);
  form.append("q2",q2);
  form.append("q3",q3);
  form.append("q4",q4);
  form.append("q5",q5);
  form.append("q6",q6);

  fetch(GAS_URL,{
    method:"POST",
    body:form
  })
  .then(r=>r.text())
  .then(t=>JSON.parse(t))
  .then(data=>{

    const coupon = data.coupon;

    if(!coupon){
      result.innerHTML = "❌ 無法取得折價券";
      return;
    }

    let warn = "";

    if(data.status === "EXIST"){
      warn = "⚠️ 已有未使用折價券";
    }

    const qr = "https://progessc01.github.io/liff-form/redeem.html?code=" + coupon;

    const qrUrl =
      "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
      encodeURIComponent(qr);

    result.innerHTML = `
  <div style="text-align:center;">

    ${warn ? `<div style="color:red;">${warn}</div>` : ""}

    <h3>🎫 折價券</h3>

    <div style="font-size:22px;">${coupon}</div>

    <img src="${qrUrl}" width="220">

    <p style="margin-top:12px; font-size:14px; color:#555;">
      📌 請截圖保存此畫面，以利後續兌換使用
    </p>

  </div>
`;
  });

}

</script>
</body>
</html>
