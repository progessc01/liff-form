<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function submitForm(){

  const q1 = document.getElementById("q1").value;
  const q2 = document.getElementById("q2").value;
  const q3 = document.getElementById("q3").value;
  const q4 = document.getElementById("q4").value;
  const q5 = document.getElementById("q5").value;
  const q6 = document.getElementById("q6").value;
  const plate = document.getElementById("plate").value;
  const result = document.getElementById("result");

  if(!q1 || !q2 || !q3 || !q4 || !q5 || !plate){
    result.style.color = "red";
    result.innerHTML = "⚠️ 請完成所有必填項目";
    return;
  }

  result.style.color = "black";
  result.innerHTML = "⏳ 送出中...";

  fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "survey",
      plate,
      q1, q2, q3, q4, q5, q6
    })
  })

  .then(res => res.text())
  .then(text => {

    console.log("GAS原始回應:", text);

    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error("GAS回傳不是JSON：" + text);
    }
  })

  .then(data => {

    console.log("解析後:", data);

    if(data.status === "INVALID_TYPE"){
      result.innerHTML = "❌ 系統錯誤：TYPE未傳";
      return;
    }

    if(!data.coupon){
      result.innerHTML = "❌ 無法取得折價券（請檢查GAS）";
      return;
    }

    let warning = "";

    if(data.status === "EXIST"){
      warning = "⚠️ 此車已有未使用折價券";
    }

    const coupon = data.coupon;

    const qrData =
      "https://progessc01.github.io/liff-form/redeem.html?code=" + coupon;

    const qrUrl =
      "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
      encodeURIComponent(qrData);

    result.innerHTML = `
      <div style="text-align:center;">

        ${warning ? `<div style="color:red;margin-bottom:10px;">${warning}</div>` : ""}

        <h3>🎉 折價券</h3>

        <div style="font-size:20px;font-weight:bold;margin-bottom:10px;">
          ${coupon}
        </div>

        <img src="${qrUrl}" width="240">

        <div style="color:#666;font-size:14px;margin-top:10px;">
          請截圖此 QR Code 使用
        </div>

      </div>
    `;

  })

  .catch(err => {

    console.log(err);

    result.style.color = "red";
    result.innerHTML = "❌ 系統錯誤：" + err.message;

  });

}

</script>
