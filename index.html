<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安建快速洗車問卷</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      max-width:400px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    select, textarea, button{
      width:100%;
      margin-top:10px;
      padding:10px;
    }

    button{
      background:#06C755;
      color:white;
      border:none;
      cursor:pointer;
    }

    #result{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🚗 安建快速洗車問卷</h2>

  <div>1️⃣ 整體滿意度 *</div>
  <select id="q1">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>2️⃣ 清潔效果 *</div>
  <select id="q2">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>3️⃣ 服務態度 *</div>
  <select id="q3">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>4️⃣ 等待時間 *</div>
  <select id="q4">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>5️⃣ 價格滿意度 *</div>
  <select id="q5">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  <div>6️⃣ 車牌號碼 *</div>
  <input type="text" id="plate" placeholder="例如：ABC-1234" />

  <div>7️⃣ 建議（選填）</div>
  <textarea id="q6"></textarea>

  <button onclick="submitForm()">送出問卷</button>

  <div id="result"></div>

</div>

<script>

function submitForm(){

  const q1 = document.getElementById("q1").value;
  const q2 = document.getElementById("q2").value;
  const q3 = document.getElementById("q3").value;
  const q4 = document.getElementById("q4").value;
  const q5 = document.getElementById("q5").value;
  const q6 = document.getElementById("q6").value;
  const plate = document.getElementById("plate").value;

  const result = document.getElementById("result");

  // ✅ 必填檢查
  if(!q1 || !q2 || !q3 || !q4 || !q5 || !plate){
    result.style.color = "red";
    result.innerHTML = "⚠️ 請完成所有必填項目";
    return;
  }

  result.style.color = "black";
  result.innerHTML = "⏳ 送出中...";

  fetch("https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec", {
  method: "POST",
  body: JSON.stringify({ plate,
  q1,q2,q3,q4,q5,q6 })
})
.then(async res => {

  const text = await res.text();
  console.log("GAS回應：", text);

  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error("回傳不是JSON：" + text);
  }

})
.then(data => {

  console.log("完整回傳：", JSON.stringify(data));

  const coupon = data.coupon || data.code || null;

  if (!coupon) {
    document.getElementById("result").innerHTML =
      "❌ 後端沒有回傳折價券（請檢查 GAS）";
    return;
  }

  const qrUrl =
    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
    + encodeURIComponent(coupon);

  document.getElementById("result").innerHTML = `
    <div style="text-align:center;">
      <h3>🎉 折價券</h3>
      <div>${coupon}</div>
      <img src="${qrUrl}" width="220">
    </div>
  `;
})
.catch(err => {

  console.log(err);

  document.getElementById("result").innerHTML =
    "❌ 送出失敗：" + err.message;

});

}

</script>

</body>
</html>
