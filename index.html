<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安建快速洗車｜問卷</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    .box { max-width:420px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
    select, textarea, button { width:100%; margin-top:10px; padding:10px; }
    button { background:#06C755; color:#fff; border:none; }
    #result { margin-top:15px; text-align:center; font-weight:bold; }
  </style>
</head>

<body>

<div class="box">

  <h2>🚗 安建快速洗車</h2>

  <div>1️⃣ 整體滿意度</div>
  <select id="q1">
    <option value="">請選擇</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <div>2️⃣ 清潔效果</div>
  <select id="q2">
    <option value="">請選擇</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <div>3️⃣ 服務態度</div>
  <select id="q3">
    <option value="">請選擇</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <div>4️⃣ 等待時間</div>
  <select id="q4">
    <option value="">請選擇</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <div>5️⃣ 價格滿意度</div>
  <select id="q5">
    <option value="">請選擇</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <div>6️⃣ 建議（選填）</div>
  <textarea id="q6"></textarea>

  <button onclick="submitForm()">送出問卷</button>

  <div id="result"></div>

</div>

<script>

let userId = "";
let liffReady = false;

async function init() {

  try {

    await liff.init({
      liffId: "2010119461-UygVR0vm"
    });

    const profile = await liff.getProfile();

    userId = profile.userId;
    liffReady = true;

    document.getElementById("result").innerHTML =
      "✔ 系統已準備完成";

  } catch (err) {
    document.getElementById("result").innerHTML =
      "❌ LIFF 初始化失敗：" + err.message;
  }
}

init();

async function submitForm() {

  if (!liffReady || !userId) {
    alert("系統尚未載入完成");
    return;
  }

  // 🚨 1️⃣ 正確抓值（避免 undefined）
  const q1 = document.getElementById("q1").value;
  const q2 = document.getElementById("q2").value;
  const q3 = document.getElementById("q3").value;
  const q4 = document.getElementById("q4").value;
  const q5 = document.getElementById("q5").value;
  const q6 = document.getElementById("q6").value;

  const data = {
    userId,
    q1, q2, q3, q4, q5, q6
  };

  console.log("SEND:", data);

  document.getElementById("result").innerHTML = "送出中...";

  try {

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbyCzusDqmq4ic7_SOctZ9Obu2CXmCBDWLkBIhxafB3aAXQkKMa_RrCcTut2WQo7uNh8/exec",
      {
        method: "POST",
        body: JSON.stringify(data)
      }
    );

    const result = await res.json();

    console.log("RESULT:", result);

    if (!result.coupon || !result.qr) {
      throw new Error("後端沒有回 coupon 或 qr");
    }

    document.getElementById("result").innerHTML =
      `
      🎉 完成！<br><br>
      折扣碼：<b>${result.coupon}</b><br><br>
      <img src="${result.qr}" width="200">
      `;

  } catch (err) {

    console.log(err);

    document.getElementById("result").innerHTML =
      "❌ 送出失敗：" + err.message;
  }
}
</script>

</body>
</html>
