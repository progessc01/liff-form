<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安建快速洗車問卷</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      max-width:400px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    select, textarea, button{
      width:100%;
      margin-top:10px;
      padding:10px;
    }

    button{
      background:#06C755;
      color:white;
      border:none;
      cursor:pointer;
    }

    #result{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🚗 安建快速洗車問卷</h2>

  <div>1️⃣ 整體滿意度 *</div>
  <select id="q1">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>2️⃣ 清潔效果 *</div>
  <select id="q2">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>3️⃣ 服務態度 *</div>
  <select id="q3">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>4️⃣ 等待時間 *</div>
  <select id="q4">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>5️⃣ 價格滿意度 *</div>
  <select id="q5">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  <div>6️⃣ 車牌號碼 *</div>
  <input type="text" id="plate" placeholder="例如：ABC-1234" />

  <div>7️⃣ 建議（選填）</div>
  <textarea id="q6"></textarea>

  <button onclick="submitForm()">送出問卷</button>

  <div id="result"></div>

</div>

<script>



function submitForm(){

  const q1 = document.getElementById("q1").value;
  const q2 = document.getElementById("q2").value;
  const q3 = document.getElementById("q3").value;
  const q4 = document.getElementById("q4").value;
  const q5 = document.getElementById("q5").value;
  const q6 = document.getElementById("q6").value;
  const plate = document.getElementById("plate").value;
  const result = document.getElementById("result");

  if(!q1 || !q2 || !q3 || !q4 || !q5 || !plate){
    result.style.color = "red";
    result.innerHTML = "⚠️ 請完成所有必填項目";
    return;
  }

  result.style.color = "black";
  result.innerHTML = "⏳ 送出中...";

  fetch("https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec", {
  method: "POST",
  body: JSON.stringify({
    type: "survey"
  })
})
.then(r => r.text())
.then(t => console.log("OK:", t))
.catch(e => console.log("ERR:", e));

  .then(res => res.text())
  .then(text => {

    console.log("GAS RAW:", text);

    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error("JSON解析失敗：" + text);
    }
  })

  .then(data => {

    console.log("GAS DATA:", data);

    // =========================
    // ❌ 系統錯誤
    // =========================
    if(data.status === "INVALID_TYPE"){
      result.innerHTML = "❌ GAS TYPE錯誤（前端沒送type）";
      return;
    }

    if(data.status === "ERROR"){
      result.innerHTML = "❌ GAS錯誤：" + data.message;
      return;
    }

    // =========================
    // ❌ 沒拿到 coupon
    // =========================
    if(!data.coupon){
      result.innerHTML = "❌ 無法取得折價券";
      return;
    }

    let warning = "";

    // =========================
    // 🟡 已存在未使用券
    // =========================
    if(data.status === "EXIST"){
      warning = "⚠️ 此車已有未使用折價券";
    }

    const coupon = data.coupon;

    const qrData =
      "https://progessc01.github.io/liff-form/redeem.html?code=" + coupon;

    const qrUrl =
      "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
      encodeURIComponent(qrData);

    result.innerHTML = `
      <div style="text-align:center;">

        ${warning ? `<div style="color:red;margin-bottom:10px;">${warning}</div>` : ""}

        <h3>🎉 折價券</h3>

        <div style="font-size:20px;font-weight:bold;margin-bottom:10px;">
          ${coupon}
        </div>

        <img src="${qrUrl}" width="240">

        <div style="color:#666;font-size:14px;margin-top:10px;">
          請截圖此 QR Code 使用
        </div>

      </div>
    `;

  })

  .catch(err => {

    console.log("ERROR:", err);

    result.style.color = "red";
    result.innerHTML = "❌ 系統錯誤：" + err.message;

  });

}

</script>
