<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安建快速洗車問卷</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      max-width:400px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    select, textarea, button{
      width:100%;
      margin-top:10px;
      padding:10px;
    }

    button{
      background:#06C755;
      color:white;
      border:none;
      cursor:pointer;
    }

    #result{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🚗 安建快速洗車問卷</h2>

  <div>1️⃣ 整體滿意度 *</div>
  <select id="q1">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>2️⃣ 清潔效果 *</div>
  <select id="q2">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>3️⃣ 服務態度 *</div>
  <select id="q3">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>4️⃣ 等待時間 *</div>
  <select id="q4">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>

  <div>5️⃣ 價格滿意度 *</div>
  <select id="q5">
    <option value="">請選擇</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  <div>6️⃣ 車牌號碼 *</div>
  <input type="text" id="plate" placeholder="例如：ABC-1234" />

  <div>7️⃣ 建議（選填）</div>
  <textarea id="q6"></textarea>

  <button onclick="submitForm()">送出問卷</button>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function submitForm(){

  const q1 = document.getElementById("q1").value;
  const q2 = document.getElementById("q2").value;
  const q3 = document.getElementById("q3").value;
  const q4 = document.getElementById("q4").value;
  const q5 = document.getElementById("q5").value;
  const q6 = document.getElementById("q6").value;
  const plate = document.getElementById("plate").value;
  const result = document.getElementById("result");

  if(!q1 || !q2 || !q3 || !q4 || !q5 || !plate){
    result.innerHTML = "⚠️ 請填完整";
    return;
  }

  result.innerHTML = "⏳ 處理中...";

  // 🚀 重點：不用 JSON，不用 headers
  const formData = new URLSearchParams();
  formData.append("type", "survey");
  formData.append("plate", plate);
  formData.append("q1", q1);
  formData.append("q2", q2);
  formData.append("q3", q3);
  formData.append("q4", q4);
  formData.append("q5", q5);
  formData.append("q6", q6);

  fetch(GAS_URL, {
    method: "POST",
    body: formData
  })

  .then(r => r.text())
  .then(t => {

    console.log("RAW:", t);

    return JSON.parse(t);
  })

  .then(data => {

    console.log("DATA:", data);

    if(!data.coupon){
      result.innerHTML = "❌ 無法取得折價券";
      return;
    }

    let warning = "";

    if(data.status === "EXIST"){
      warning = "⚠️ 已有未使用折價券";
    }

    const qrData =
"https://progessc01.github.io/liff-form/redeem.html?code=" + coupon;

const qrUrl =
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
+ encodeURIComponent(qrData);

    result.innerHTML = `
      <div style="text-align:center;">

        ${warning ? `<div style="color:red;">${warning}</div>` : ""}

        <h3>🎉 折價券</h3>

        <div style="font-size:20px;font-weight:bold;">
          ${data.coupon}
        </div>

        <img src="${qrUrl}" width="240">

      </div>
    `;

  })

  .catch(err => {
    console.log(err);
    result.innerHTML = "❌ 系統錯誤：" + err.message;
  });

}

</script>
