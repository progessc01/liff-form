<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>安建員工登入</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,"Microsoft JhengHei",sans-serif;
  background:linear-gradient(180deg,#f2e5df,#ead8d2,#dfc9c2);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:420px;
  background:white;
  border-radius:26px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
  margin:0 0 22px;
  text-align:center;
  color:#5b4650;
}

label{
  display:block;
  margin-top:14px;
  font-weight:900;
  color:#5b4650;
}

input,
select,
button{
  width:100%;
  padding:15px;
  margin-top:8px;
  font-size:18px;
  border-radius:16px;
  box-sizing:border-box;
}

input,
select{
  border:1px solid #ddd;
  background:#fff;
  color:#4a3d42;
  outline:none;
}

input:focus,
select:focus{
  border-color:#b7778d;
  box-shadow:0 0 0 4px rgba(183,119,141,.12);
}

button{
  margin-top:22px;
  border:0;
  background:linear-gradient(135deg,#b7778d,#8d5d70);
  color:white;
  font-weight:900;
  cursor:pointer;
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.msg{
  display:none;
  margin-top:15px;
  padding:14px;
  border-radius:14px;
  background:#dc2626;
  color:white;
  font-weight:900;
  text-align:center;
  line-height:1.5;
}

.progressWrap{
  display:none;
  margin-top:18px;
}

.progressTrack{
  width:100%;
  height:13px;
  background:#eadde2;
  border-radius:999px;
  overflow:hidden;
}

.progressBar{
  width:0%;
  height:100%;
  background:linear-gradient(135deg,#b7778d,#8d5d70);
  border-radius:999px;
  transition:width .25s ease;
}

.progressText{
  margin-top:9px;
  text-align:center;
  color:#7a4e60;
  font-size:14px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="box">

  <h1>安建員工登入</h1>

  <form id="loginForm" onsubmit="return login();">

    <label for="storeCode">分店</label>
    <select id="storeCode" required>
      <option value="">請選擇分店</option>
      <option value="AJ01">AJ01｜總店</option>
      <option value="AJ02">AJ02｜員林店</option>
      <option value="AJ03">AJ03｜彰南店</option>
      <option value="AJ04">AJ04｜山福店</option>
    </select>

    <label for="staffNo">工號</label>
    <input
      id="staffNo"
      placeholder="請輸入工號，例如 001"
      inputmode="numeric"
      autocomplete="username"
      required
    >

    <label for="password">密碼</label>
    <input
      id="password"
      type="password"
      placeholder="請輸入密碼"
      autocomplete="current-password"
      required
    >

    <button id="loginBtn" type="submit">
      員工登入
    </button>

  </form>

  <div id="progressWrap" class="progressWrap">
    <div class="progressTrack">
      <div id="progressBar" class="progressBar"></div>
    </div>

    <div id="progressText" class="progressText">
      0%
    </div>
  </div>

  <div id="msg" class="msg"></div>

</div>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

let progressTimer = null;
let progressValue = 0;
let loginFinished = false;

function showMsg(text){

  const msg =
    document.getElementById("msg");

  msg.innerText =
    text || "";

  msg.style.display =
    text ? "block" : "none";
}

function hideMsg(){
  showMsg("");
}

function updateProgress(value,text){

  const wrap =
    document.getElementById("progressWrap");

  const bar =
    document.getElementById("progressBar");

  const label =
    document.getElementById("progressText");

  progressValue =
    Math.max(
      0,
      Math.min(100,Number(value || 0))
    );

  wrap.style.display =
    "block";

  bar.style.width =
    progressValue + "%";

  label.innerText =
    progressValue + "%｜" + (text || "處理中");
}

function startProgress(){

  clearInterval(progressTimer);

  loginFinished = false;
  progressValue = 5;

  const bar =
    document.getElementById("progressBar");

  bar.style.background =
    "linear-gradient(135deg,#b7778d,#8d5d70)";

  updateProgress(
    progressValue,
    "正在連線"
  );

  progressTimer =
    setInterval(function(){

      if(loginFinished || progressValue >= 90){
        return;
      }

      let step = 1;

      if(progressValue < 35){
        step = 5;
      }else if(progressValue < 65){
        step = 3;
      }

      progressValue =
        Math.min(
          90,
          progressValue + step
        );

      let text = "正在載入系統";

      if(progressValue < 35){
        text = "正在連線";
      }else if(progressValue < 65){
        text = "正在驗證帳號";
      }else if(progressValue < 85){
        text = "正在讀取員工資料";
      }

      updateProgress(
        progressValue,
        text
      );

    },250);
}

function finishProgress(){

  loginFinished = true;

  clearInterval(progressTimer);

  updateProgress(
    100,
    "登入成功"
  );
}

function failProgress(message){

  loginFinished = true;

  clearInterval(progressTimer);

  const bar =
    document.getElementById("progressBar");

  bar.style.background =
    "#dc2626";

  updateProgress(
    100,
    message || "登入失敗"
  );
}

function resetLoginButton(){

  const btn =
    document.getElementById("loginBtn");

  btn.disabled = false;
  btn.innerText = "員工登入";
}

function login(){

  hideMsg();

  const storeCode =
    document.getElementById("storeCode").value.trim();

  const staffNoRaw =
    document.getElementById("staffNo").value.trim();

  const password =
    document.getElementById("password").value.trim();

  if(!storeCode || !staffNoRaw || !password){

    const message =
      "請完整輸入分店、工號與密碼";

    showMsg(message);
    failProgress(message);

    return false;
  }

  const staffNo =
    staffNoRaw
      .replace(/\s/g,"")
      .padStart(3,"0");

  const btn =
    document.getElementById("loginBtn");

  btn.disabled = true;
  btn.innerText = "登入中...";

  startProgress();

  const form =
    new URLSearchParams();

  form.append("type","loginStaff");
  form.append("storeCode",storeCode);
  form.append("staffNo",staffNo);
  form.append("password",password);

  fetch(GAS_URL,{
    method:"POST",
    body:form
  })
  .then(function(response){

    if(!response.ok){
      throw new Error(
        "伺服器連線失敗：" +
        response.status
      );
    }

    updateProgress(
      Math.max(progressValue,45),
      "正在驗證帳號"
    );

    return response.text();
  })
  .then(function(text){

    let res;

    try{

      res =
        JSON.parse(text);

    }catch(e){

      console.log(
        "SERVER_TEXT",
        text
      );

      throw new Error(
        "伺服器回傳不是 JSON，請確認 GAS 已重新部署"
      );
    }

    if(!res || res.status !== "OK"){

      throw new Error(
        (res && res.message) ||
        "登入失敗，請確認帳號密碼"
      );
    }

    updateProgress(
      88,
      "正在建立登入資料"
    );

    const loginText =
      JSON.stringify(res);

    /*
      GitHub 網域自己的登入備份。
      真正進入 GAS 後，index.html 會再透過 loginData
      建立 GAS 網域的 localStorage。
    */
    try{
      localStorage.setItem(
        "aj_staff",
        loginText
      );

      localStorage.setItem(
        "staff",
        loginText
      );
    }catch(e){
      console.log(
        "GitHub localStorage 寫入失敗",
        e
      );
    }

    try{
      sessionStorage.setItem(
        "aj_staff",
        loginText
      );
    }catch(e){
      console.log(
        "GitHub sessionStorage 寫入失敗",
        e
      );
    }

    const loginData =
      btoa(
        unescape(
          encodeURIComponent(
            loginText
          )
        )
      );

    finishProgress();

    /*
      稍微停留，讓使用者看得到 100%。
    */
    setTimeout(function(){

      window.location.replace(
        GAS_URL +
        "?page=index&loginData=" +
        encodeURIComponent(loginData)
      );

    },350);
  })
  .catch(function(err){

    const message =
      err && err.message
        ? err.message
        : String(err);

    showMsg(message);
    failProgress(message);
    resetLoginButton();
  });

  return false;
}
</script>

</body>
</html>
