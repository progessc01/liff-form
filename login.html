<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>安建員工登入</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,"Microsoft JhengHei";
  background:linear-gradient(180deg,#f2e5df,#ead8d2,#dfc9c2);
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  width:90%;
  max-width:420px;
  background:white;
  border-radius:26px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
  text-align:center;
  color:#5b4650;
}

label{
  display:block;
  margin-top:14px;
  font-weight:900;
  color:#5b4650;
}

input,
select,
button{
  width:100%;
  padding:15px;
  margin-top:8px;
  font-size:18px;
  border-radius:16px;
  box-sizing:border-box;
}

input,
select{
  border:1px solid #ddd;
}

button{
  margin-top:22px;
  border:0;
  background:linear-gradient(135deg,#b7778d,#8d5d70);
  color:white;
  font-weight:900;
}

button:disabled{
  opacity:.55;
}

.msg{
  display:none;
  margin-top:15px;
  padding:14px;
  border-radius:14px;
  background:#dc2626;
  color:white;
  font-weight:900;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">

  <h1>安建員工登入</h1>

  <form id="loginForm" onsubmit="return login();">

    <label>分店</label>
    <select id="storeCode" required>
      <option value="">請選擇分店</option>
      <option value="AJ01">AJ01｜總店</option>
      <option value="AJ02">AJ02｜員林店</option>
      <option value="AJ03">AJ03｜彰南店</option>
      <option value="AJ04">AJ04｜山福店</option>
    </select>

    <label>工號</label>
    <input
      id="staffNo"
      placeholder="請輸入工號，例如 001"
      inputmode="numeric"
      autocomplete="username"
      required
    >

    <label>密碼</label>
    <input
      id="password"
      type="password"
      placeholder="請輸入密碼"
      autocomplete="current-password"
      required
    >

    <button id="loginBtn" type="submit">
      員工登入
    </button>

  </form>

  <div id="msg" class="msg"></div>

</div>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function showMsg(text){

  const msg =
    document.getElementById("msg");

  msg.innerText =
    text;

  msg.style.display =
    "block";
}

function hideMsg(){

  const msg =
    document.getElementById("msg");

  msg.style.display =
    "none";

  msg.innerText =
    "";
}

function login(){

  hideMsg();

  const storeCode =
    document.getElementById("storeCode").value.trim();

  const staffNoRaw =
    document.getElementById("staffNo").value.trim();

  const password =
    document.getElementById("password").value.trim();

  if(!storeCode || !staffNoRaw || !password){
    showMsg("請完整輸入分店、工號與密碼");
    return false;
  }

  const staffNo =
    staffNoRaw.replace(/\s/g,"").padStart(3,"0");

  const btn =
    document.getElementById("loginBtn");

  btn.disabled =
    true;

  btn.innerText =
    "登入中...";

  const form =
    new URLSearchParams();

  form.append("type","loginStaff");
  form.append("storeCode",storeCode);
  form.append("staffNo",staffNo);
  form.append("password",password);

  fetch(GAS_URL,{
    method:"POST",
    body:form
  })
  .then(r=>r.text())
  .then(text=>{

    let res;

    try{
      res = JSON.parse(text);
    }catch(e){
      console.log(text);
      showMsg("伺服器回傳不是 JSON，請確認 GAS 已重新部署");
      return;
    }

    if(!res || res.status !== "OK"){
      showMsg((res && res.message) || "登入失敗，請確認帳號密碼");
      return;
    }

    localStorage.setItem(
      "staff",
      JSON.stringify(res)
    );

    sessionStorage.setItem(
      "aj_staff",
      JSON.stringify(res)
    );

    sessionStorage.setItem("aj_storeCode",res.storeCode || "");
    sessionStorage.setItem("aj_storeName",res.storeName || "");
    sessionStorage.setItem("aj_staffName",res.staffName || "");
    sessionStorage.setItem("aj_staffAccount",res.account || "");
    sessionStorage.setItem("aj_role",res.role || "");

	const loginData =
  	btoa(
  	  unescape(
  	    encodeURIComponent(
        JSON.stringify(res)
  		    )
  	  )
  	);

	window.location.href =
 	 GAS_URL + "?page=index#loginData=" + loginData;
	
 	 })
  .catch(err=>{
    showMsg("登入失敗：" + err.message);
  })
  .finally(()=>{

    btn.disabled =
      false;

    btn.innerText =
      "員工登入";

  });

  return false;
}
</script>

</body>
</html>
