<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>安建快速洗車｜車況查看教學</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f172a;
  font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;
  color:#fff;
}

.header{
  text-align:center;
  padding:50px 20px 30px;
}

.logo{
  font-size:48px;
  font-weight:900;
  margin-bottom:12px;
}

.subTitle{
  font-size:22px;
  color:#cbd5e1;
  line-height:1.6;
}

.notice{
  max-width:900px;
  margin:0 auto 30px;
  padding:0 20px;
}

.noticeBox{
  background:#1e293b;
  border-radius:20px;
  padding:25px;
  text-align:center;
  font-size:22px;
  line-height:1.8;
}

.container{
  max-width:900px;
  margin:auto;
  padding:0 15px 50px;
}

.step{
  margin-bottom:35px;
}

.stepTitle{
  font-size:30px;
  font-weight:900;
  margin-bottom:15px;
  text-align:center;
}

.stepDesc{
  text-align:center;
  font-size:20px;
  color:#cbd5e1;
  margin-bottom:15px;
}

.step img{
  width:100%;
  display:block;
  border-radius:22px;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
}

.lineBtn{
  display:block;
  width:100%;
  max-width:700px;
  margin:30px auto 0;
  background:#06C755;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:28px 20px;
  border-radius:24px;
  font-size:30px;
  font-weight:900;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
}

.lineSub{
  margin-top:8px;
  font-size:16px;
  font-weight:500;
}

.footer{
  text-align:center;
  padding:25px;
  color:#94a3b8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🚗 安建快速洗車</div>
  <div class="subTitle">
    即時查看現場車況與排隊狀況
  </div>
</div>

<div class="notice">
  <div class="noticeBox">
    加入 LWS380 後<br>
    可隨時查看洗車場目前狀況<br>
    出發前先確認是否需要排隊
  </div>
</div>

<div class="container">

  <div class="step">
    <div class="stepTitle">步驟 1｜註冊帳號</div>
    <div class="stepDesc">依照畫面完成註冊</div>
    <img src="A1.jpg" alt="註冊帳號">
  </div>

  <div class="step">
    <div class="stepTitle">步驟 2｜點選「我的」</div>
    <div class="stepDesc">請依照圖片點選「我的」</div>
    <img src="A2.jpg" alt="點選我的">
  </div>

  <div class="step">
    <div class="stepTitle">步驟 3｜找到帳號</div>
    <div class="stepDesc">找到自己帳號ID</div>
    <img src="A3.jpg" alt="完成設定">
  </div>

  <div class="step">
    <div class="stepTitle">步驟 4｜截圖回傳給我們</div>
    <div class="stepDesc">請將完成畫面截圖並傳送至官方 LINE</div>
    <img src="A4.jpg" alt="截圖回傳給我們">
  </div>

  <a class="lineBtn"
     href="https://lin.ee/v7PEpQ7"
     target="_blank">

     💬 加入安建官方 LINE

     <div class="lineSub">
       完成後請將畫面截圖傳給我們
     </div>

  </a>

</div>

<div class="footer">
  © 安建快速洗車
</div>

</body>
</html>
