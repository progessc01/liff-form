<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>安建快速洗車｜價目表</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f172a;
  font-family:"Microsoft JhengHei",sans-serif;
  color:white;
}

.header{
  text-align:center;
  padding:35px 15px 25px;
}

.logo{
  font-size:32px;
  font-weight:bold;
  margin-bottom:10px;
}

.subTitle{
  color:#cbd5e1;
  font-size:15px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:0 15px 30px;
}

.card{
  margin-bottom:25px;
}

.card img{
  width:100%;
  display:block;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.footer{
  text-align:center;
  padding:20px 20px 50px;
}

.mapBtn{
  display:inline-block;
  background:#22c55e;
  color:white;
  text-decoration:none;
  padding:16px 30px;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s;
}

.mapBtn:hover{
  transform:scale(1.05);
}

.copyright{
  margin-top:20px;
  color:#94a3b8;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">🚗 安建快速洗車</div>
  <div class="subTitle">
    價目表與服務項目
  </div>
</div>

<div class="container">

  <div class="card">
    <img src="1.jpg" alt="價目表第一頁">
  </div>

  <div class="card">
    <img src="2.jpg" alt="價目表第二頁">
  </div>

  <div class="card">
    <img src="3.jpg" alt="價目表第三頁">
  </div>

</div>

<div class="footer">

  <a class="mapBtn"
     href="https://maps.app.goo.gl/1bgFF1A51tgvRjEW7?g_st=il"
     target="_blank">
     📍 點我導航到安建快速洗車
  </a>

  <div class="copyright">
    © 安建快速洗車 All Rights Reserved
  </div>

</div>

</body>
</html>
