<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>安建快速洗車｜價目表</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f172a;
  font-family:"Microsoft JhengHei",sans-serif;
  color:white;
}

.header{
  text-align:center;
  padding:30px 15px;
}

.logo{
  font-size:32px;
  font-weight:bold;
  margin-bottom:10px;
}

.subTitle{
  color:#cbd5e1;
  font-size:15px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:0 15px 50px;
}

.card{
  margin-bottom:25px;
}

.card img{
  width:100%;
  display:block;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.footer{
  text-align:center;
  color:#94a3b8;
  padding:20px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">🚗 安建快速洗車</div>
  <div class="subTitle">
    價目表與服務項目
  </div>
</div>

<div class="container">

  <div class="card">
    <img src="1.jpg" alt="價目表1">
  </div>

  <div class="card">
    <img src="2.jpg" alt="價目表2">
  </div>

  <div class="card">
    <img src="3.jpg" alt="價目表3">
  </div>

</div>

<div class="footer">
  © 安建快速洗車
</div>

</body>
</html>
