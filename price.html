<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>安建快速洗車｜價目表</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:linear-gradient(180deg,#0f172a,#1e293b);
  font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;
  color:#fff;
}

.header{
  text-align:center;
  padding:60px 20px 40px;
}

.logo{
  font-size:clamp(42px,8vw,72px);
  font-weight:900;
  line-height:1.2;
  margin-bottom:15px;
  text-shadow:0 4px 12px rgba(0,0,0,.35);
}

.subTitle{
  font-size:clamp(18px,4vw,28px);
  color:#cbd5e1;
  font-weight:500;
}

.container{
  max-width:900px;
  margin:auto;
  padding:0 15px;
}

.card{
  margin-bottom:30px;
}

.card img{
  width:100%;
  display:block;
  border-radius:24px;
  box-shadow:0 12px 30px rgba(0,0,0,.4);
}

.footer{
  padding:20px 20px 60px;
}

.mapBtn{
  display:block;
  width:100%;
  max-width:700px;
  margin:0 auto;

  background:linear-gradient(135deg,#22c55e,#16a34a);

  color:white;
  text-decoration:none;

  text-align:center;

  padding:28px 20px;

  border-radius:24px;

  font-size:clamp(24px,5vw,34px);
  font-weight:900;

  box-shadow:0 15px 35px rgba(0,0,0,.35);

  transition:all .2s ease;
}

.mapBtn:hover{
  transform:translateY(-3px);
}

.mapIcon{
  display:block;
  font-size:42px;
  margin-bottom:8px;
}

.mapSub{
  font-size:16px;
  font-weight:500;
  opacity:.95;
  margin-top:8px;
}

.copyright{
  text-align:center;
  margin-top:30px;
  color:#94a3b8;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">

  <div class="logo">
    🚗 安建快速洗車
  </div>

  <div class="subTitle">
    專業快速洗車｜奈米鍍膜｜會員優惠
  </div>

</div>

<div class="container">

  <div class="card">
    <img src="11.jpg" alt="價目表第一頁">
  </div>

  <div class="card">
    <img src="22.jpg" alt="價目表第二頁">
  </div>

  <div class="card">
    <img src="33.jpg" alt="價目表第三頁">
  </div>

  <div class="card">
    <img src="44.jpg" alt="價目表第四頁">
  </div>

  <div class="card">
    <img src="55.jpg" alt="價目表第五頁">
  </div>

  <div class="card">
    <img src="66.jpg" alt="價目表第六頁">
  </div>
</div>

<div class="footer">

  <a class="mapBtn"
     href="https://maps.app.goo.gl/1bgFF1A51tgvRjEW7?g_st=il"
     target="_blank">

      <span class="mapIcon">📍</span>

      立即導航前往安建快速洗車

      <div class="mapSub">
        點擊開啟 Google Maps 導航
      </div>

  </a>

  <div class="copyright">
    © 安建快速洗車 All Rights Reserved
  </div>

</div>

</body>
</html>
