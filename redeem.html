<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>掃碼核銷系統</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    #reader {
      width: 100%;
      max-width: 500px;
      margin: auto;
    }

    #reader video {
      width: 100% !important;
      height: 420px !important;
      object-fit: cover;
      border-radius: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .code-box {
      margin-top: 10px;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>

<body>

<h2>🚗 安建快速洗車 - 核銷系統</h2>

<div id="reader"></div>

<div id="result">等待掃碼...</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const urlCode = urlParams.get("code");

// =========================
// 🔥 如果 QR 是網址直接帶入
// =========================
if (urlCode) {
  redeem(urlCode);
}

// =========================
// 📷 掃描成功
// =========================
function onScanSuccess(decodedText) {
  redeem(decodedText);
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 350 },
  onScanSuccess
);

// =========================
// 🚀 核銷核心
// =========================
function redeem(code) {

  document.getElementById("result").innerHTML =
    "掃描成功：" + code + "<br>核銷中...";

  fetch("你的GAS網址", {
    method: "POST",
    body: JSON.stringify({
      type: "redeem",
      code: code
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "OK") {
      document.getElementById("result").innerHTML =
        "🟢 核銷成功<br>車牌：" + data.plate;
    }

    else if (data.status === "USED") {
      document.getElementById("result").innerHTML =
        "🔴 此券已使用";
    }

    else {
      document.getElementById("result").innerHTML =
        "❌ 查無此券";
    }

  })
  .catch(err => {
    document.getElementById("result").innerHTML =
      "❌ 系統錯誤：" + err.message;
  });

}

</script>

</body>
</html>
