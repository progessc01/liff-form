```html
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核銷系統</title>

<style>
body{
  font-family: Arial;
  padding:20px;
  background:#f5f5f5;
}

.box{
  max-width:420px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

.info{
  margin-top:12px;
  font-size:18px;
}

button{
  width:100%;
  padding:14px;
  margin-top:18px;
  background:#06C755;
  color:white;
  border:none;
  font-size:18px;
  border-radius:8px;
}

button:disabled{
  background:#999;
}

#msg{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">

  <h2>🎫 折價券核銷</h2>

  <div class="info">
    🚗 車牌：<span id="plate">讀取中...</span>
  </div>

  <div class="info">
    🎫 CODE：<span id="code">讀取中...</span>
  </div>

  <div class="info">
    💰 折價：<span id="discount">判斷中...</span>
  </div>

  <div class="info">
    📌 狀態：<span id="state">檢查中...</span>
  </div>

  <button id="redeemBtn" onclick="redeem()">
    確認核銷
  </button>

  <div id="msg"></div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const params = new URLSearchParams(location.search);
const code = params.get("code");

const plateEl = document.getElementById("plate");
const codeEl = document.getElementById("code");
const stateEl = document.getElementById("state");
const msgEl = document.getElementById("msg");
const btnEl = document.getElementById("redeemBtn");
const discountEl = document.getElementById("discount");

// =========================
// CODE 防呆
// =========================
if(!code){

  msgEl.innerText = "❌ 無效QRCode";
  codeEl.innerText = "無";

  btnEl.disabled = true;

}else{

  codeEl.innerText = code;

  // =========================
  // 判斷折價金額
  // =========================
  if(code.includes("AJ-30")){
    discountEl.innerText = "30元";
  }
  else if(code.includes("AJ-20")){
    discountEl.innerText = "20元";
  }
  else{
    discountEl.innerText = "未知";
  }

  // =========================
  // 查詢券
  // =========================
  fetch(GAS_URL,{
    method:"POST",
    body:new URLSearchParams({
      type:"check",
      code:code
    })
  })
  .then(r=>r.text())
  .then(t=>JSON.parse(t))
  .then(data=>{

    console.log(data);

    if(data.status !== "OK"){

      msgEl.innerText = "❌ 查無券";
      plateEl.innerText = "-";
      stateEl.innerText = "-";

      btnEl.disabled = true;

      return;
    }

    plateEl.innerText = data.plate || "-";
    stateEl.innerText = data.state || "-";

    // 已使用
    if(data.state === "已使用"){

      msgEl.innerText = "⚠️ 此券已使用";
      btnEl.disabled = true;
    }

  })
  .catch(err=>{

    console.log(err);

    msgEl.innerText = "❌ 系統錯誤";
    btnEl.disabled = true;

  });

}

// =========================
// 核銷
// =========================
function redeem(){

  btnEl.disabled = true;
  btnEl.innerText = "核銷中...";

  fetch(GAS_URL,{
    method:"POST",
    body:new URLSearchParams({
      type:"redeem",
      code:code
    })
  })
  .then(r=>r.text())
  .then(t=>JSON.parse(t))
  .then(data=>{

    console.log(data);

    if(data.status === "OK"){

      stateEl.innerText = "已使用";
      msgEl.innerText = "🎉 核銷成功";

      return;
    }

    if(data.status === "USED"){

      stateEl.innerText = "已使用";
      msgEl.innerText = "⚠️ 此券已使用";

      return;
    }

    if(data.status === "NOT_FOUND"){

      msgEl.innerText = "❌ 查無券";

      return;
    }

    msgEl.innerText = "❌ 核銷失敗";

  })
  .catch(err=>{

    console.log(err);

    msgEl.innerText = "❌ 系統錯誤";

  })
  .finally(()=>{

    btnEl.innerText = "確認核銷";

  });

}

</script>

</body>
</html>
