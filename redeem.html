<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核銷系統</title>

<style>
body{
  font-family: Arial;
  padding:20px;
  background:#f5f5f5;
}

.box{
  max-width:420px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

.info{
  margin-top:12px;
  font-size:18px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#06C755;
  color:white;
  border:none;
  font-size:16px;
}
</style>
</head>

<body>

<div class="box">

  <h2>🎫 折價券核銷</h2>

  <div class="info">🚗 車牌：<span id="plate">讀取中...</span></div>
  <div class="info">🎫 CODE：<span id="code">讀取中...</span></div>
  <div class="info">📌 狀態：<span id="state">檢查中...</span></div>

  <button onclick="redeem()">確認核銷</button>

  <div id="msg" style="margin-top:10px;"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const params = new URLSearchParams(location.search);
const code = params.get("code");

document.getElementById("code").innerText = code;

fetch(GAS_URL,{
  method:"POST",
  body:new URLSearchParams({
    type:"check",
    code:code
  })
})
.then(r=>r.text())
.then(t=>JSON.parse(t))
.then(data=>{

  if(data.status !== "OK"){
    document.getElementById("msg").innerText = "❌ 查無券";
    return;
  }

  document.getElementById("plate").innerText = data.plate;
  document.getElementById("state").innerText = data.state;
});

function redeem(){

  fetch(GAS_URL,{
    method:"POST",
    body:new URLSearchParams({
      type:"redeem",
      code:code
    })
  })
  .then(r=>r.text())
  .then(t=>JSON.parse(t))
  .then(data=>{

    if(data.status === "OK"){
      document.getElementById("state").innerText = "已使用";
      document.getElementById("msg").innerText = "🎉 核銷成功";
    }

    if(data.status === "USED"){
      document.getElementById("msg").innerText = "⚠️ 已使用";
    }

    if(data.status === "NOT_FOUND"){
      document.getElementById("msg").innerText = "❌ 查無券";
    }

  });

}

</script>

</body>
</html>
