<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>核銷系統</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    .box {
      max-width: 400px;
      margin: auto;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
    }

    .info {
      font-size: 18px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }

    .ok { background: #06C755; color: white; }
    .cancel { background: #ccc; }
  </style>
</head>

<body>

<h2>🚗 安建快速洗車核銷</h2>

<div class="box" id="box">
  <div id="status">讀取中...</div>
</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code");

let plate = "";

// =========================
// 1️⃣ 先查詢券資訊
// =========================
fetch("你的GAS網址", {
  method: "POST",
  body: JSON.stringify({
    type: "check",
    code: code
  })
})
.then(res => res.json())
.then(data => {

  if (!data || !data.code) {
    document.getElementById("box").innerHTML =
      "❌ 查無此券";
    return;
  }

  plate = data.plate;

  document.getElementById("box").innerHTML = `

    <div class="info">🚗 車號：${plate}</div>
    <div class="info">🎟️ CODE：${data.code}</div>

    <button class="ok" onclick="redeem()">確認核銷</button>
    <button class="cancel" onclick="history.back()">取消</button>

  `;
});

// =========================
// 2️⃣ 核銷動作
// =========================
function redeem() {

  fetch("你的GAS網址", {
    method: "POST",
    body: JSON.stringify({
      type: "redeem",
      code: code
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "OK") {
      document.getElementById("box").innerHTML =
        "🟢 核銷成功<br>車號：" + plate;
    }

    else if (data.status === "USED") {
      document.getElementById("box").innerHTML =
        "🔴 此券已使用";
    }

    else {
      document.getElementById("box").innerHTML =
        "❌ 查無此券";
    }

  });

}

</script>

</body>
</html>
