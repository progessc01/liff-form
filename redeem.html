<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>安建快速洗車｜核銷系統</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    /* 🔥 相機放大 */
    #reader {
      width: 100%;
      max-width: 600px;
      margin: auto;
      border-radius: 10px;
      overflow: hidden;
    }

    #reader video {
      width: 100% !important;
      height: 450px !important;
      object-fit: cover;
    }

    /* 資訊區 */
    .box {
      background: white;
      max-width: 600px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
    }

    .row {
      font-size: 20px;
      margin: 10px 0;
    }

    .label {
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .confirm {
      background: #06C755;
      color: white;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<h2>🚗 安建快速洗車核銷</h2>

<div id="reader"></div>

<div class="box">
  <div class="row">
    <span class="label">🚗 車牌：</span>
    <span id="plate">等待掃描...</span>
  </div>

  <div class="row">
    <span class="label">🎟️ CODE：</span>
    <span id="code">---</span>
  </div>

  <button class="confirm" onclick="redeem()">確認核銷</button>

  <div class="status" id="status"></div>
</div>

<script>

let currentCode = "";
let currentPlate = "";

// =========================
// 📷 掃碼成功
// =========================
function onScanSuccess(decodedText) {

  currentCode = decodedText;

  document.getElementById("code").innerText = decodedText;
  document.getElementById("status").innerText = "掃描成功，等待核銷...";

  // 👉 先查資料（取得車牌）
  fetch("https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "check",
      code: decodedText
    })
  })
  .then(res => res.json())
  .then(data => {

    if (!data || data.error) {
      document.getElementById("status").innerText = "❌ 查無此券";
      return;
    }

    currentPlate = data.plate;
    document.getElementById("plate").innerText = data.plate;
  });

}

// =========================
// 📷 啟動相機（放大版）
// =========================
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: 350
  },
  onScanSuccess
);

// =========================
// ✅ 核銷
// =========================
function redeem() {

  if (!currentCode) {
    document.getElementById("status").innerText = "⚠️ 尚未掃描";
    return;
  }

  document.getElementById("status").innerText = "核銷中...";

  fetch("你的GAS網址", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "redeem",
      code: currentCode
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "OK") {
      document.getElementById("status").innerText =
        "🟢 核銷成功";
    }

    else if (data.status === "USED") {
      document.getElementById("status").innerText =
        "🔴 已使用";
    }

    else {
      document.getElementById("status").innerText =
        "❌ 查無此券";
    }

  })
  .catch(err => {
    document.getElementById("status").innerText =
      "❌ 系統錯誤：" + err.message;
  });

}

</script>

</body>
</html>
