<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>掃碼核銷系統</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🚗 安建快速洗車 - 掃碼核銷</h2>

<div id="reader"></div>

<div id="result">等待掃碼...</div>

<script>

function onScanSuccess(decodedText) {

  document.getElementById("result").innerHTML =
    "掃描成功：" + decodedText + "<br>核銷中...";

  fetch("你的GAS網址", {
    method: "POST",
    body: JSON.stringify({
      type: "redeem",
      code: decodedText
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "OK") {
      document.getElementById("result").innerHTML =
        "🟢 核銷成功<br>車牌：" + data.plate;
    }

    else if (data.status === "USED") {
      document.getElementById("result").innerHTML =
        "🔴 此券已使用";
    }

    else {
      document.getElementById("result").innerHTML =
        "❌ 查無此券";
    }

  })
  .catch(err => {
    document.getElementById("result").innerHTML =
      "❌ 系統錯誤：" + err.message;
  });

}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },   // 後鏡頭
  {
    fps: 10,
    qrbox: 250
  },
  onScanSuccess
);

</script>

</body>
</html>
