<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>安建快速洗車｜核銷系統</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    /* 📷 相機放大 */
    #reader {
      width: 100%;
      max-width: 650px;
      margin: auto;
      border-radius: 10px;
      overflow: hidden;
    }

    #reader video  {
  width: 100% !important;
  height: auto !important;
  max-height: 70vh;
  object-fit: cover;
}

    /* 資訊區 */
    .box {
      background: white;
      max-width: 650px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
    }

    .row {
      font-size: 20px;
      margin: 12px 0;
    }

    .label {
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .confirm {
      background: #06C755;
      color: white;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🚗 安建快速洗車核銷</h2>

<div id="reader"></div>

<div class="box">

  <div class="row">
    <span class="label">🚗 車牌：</span>
    <span id="plate">等待掃描...</span>
  </div>

  <div class="row">
    <span class="label">🎟️ CODE：</span>
    <span id="code">---</span>
  </div>

  <button class="confirm" onclick="redeem()">確認核銷</button>

  <div class="status" id="status"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

let currentCode = "";
let currentPlate = "";
let isProcessing = false;

// =========================
// QR解析（支援 URL / code）
// =========================
function extractCode(text) {

  if (!text) return "";

  if (text.includes("code=")) {
    return text.split("code=")[1];
  }

  return text;
}

// =========================
// 📷 掃描成功
// =========================
function onScanSuccess(decodedText) {

  // 🔥 防止連續掃描
  if (isProcessing) return;

  isProcessing = true;

  const code = extractCode(decodedText);
  currentCode = code;

  document.getElementById("code").innerText = code;
  document.getElementById("status").innerText = "🔍 搜尋中，請稍後...";

  fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "check",
      code: code
    })
  })
  .then(res => res.json())
  .then(data => {

    if (!data || data.error) {
      document.getElementById("status").innerText = "❌ 查無此券";
      isProcessing = false;
      return;
    }

    currentPlate = data.plate;
    document.getElementById("plate").innerText = data.plate;

    document.getElementById("status").innerText = "✔ 可核銷";

  })
  .catch(err => {
    document.getElementById("status").innerText =
      "❌ 系統錯誤：" + err.message;

    isProcessing = false;
  });

}

// =========================
// 📷 啟動相機
// =========================
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  {
    fps: 15,
    qrbox: function(viewfinderWidth, viewfinderHeight) {
  const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
  return {
    width: minEdge * 0.7,
    height: minEdge * 0.7
  };
}
  },
  onScanSuccess
);

// =========================
// ✅ 核銷
// =========================
function redeem() {

  if (!currentCode) {
    document.getElementById("status").innerText = "⚠️ 尚未掃描";
    return;
  }

  document.getElementById("status").innerText = "核銷中...";

  fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "redeem",
      code: currentCode
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "OK") {
      document.getElementById("status").innerText =
        "🟢 核銷成功";
    }

    else if (data.status === "USED") {
      document.getElementById("status").innerText =
        "🔴 此券已使用";
    }

    else {
      document.getElementById("status").innerText =
        "❌ 查無此券";
    }

    // 🔥 核銷後解鎖
    isProcessing = false;

    // 🔄 清畫面（方便下一台車）
    currentCode = "";
    currentPlate = "";
    document.getElementById("code").innerText = "---";
    document.getElementById("plate").innerText = "等待掃描...";

  })
  .catch(err => {
    document.getElementById("status").innerText =
      "❌ 系統錯誤：" + err.message;

    isProcessing = false;
  });

}

</script>

</body>
</html>
