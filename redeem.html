<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核銷系統</title>

<style>
body{
  font-family: Arial;
  padding:20px;
  background:#f5f5f5;
}

.box{
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

#reader{
  width:100%;
}

.info{
  margin-top:15px;
  font-size:18px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#06C755;
  color:white;
  border:none;
  font-size:16px;
}
</style>
</head>

<body>

<div class="box">

  <h2>📷 核銷掃碼</h2>

  <div id="reader"></div>

  <div class="info">
    🚗 車牌：<span id="plate">等待掃描</span>
  </div>

  <div class="info">
    🎫 CODE：<span id="code">等待掃描</span>
  </div>

  <button onclick="redeem()">確認核銷</button>

  <div id="msg" style="margin-top:10px;"></div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

let currentCode = "";
let scanning = true;

// 📷 開啟相機
const qr = new Html5Qrcode("reader");

qr.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: 250
  },
  (decodedText) => {

    if(!scanning) return;

    scanning = false;

    document.getElementById("msg").innerHTML = "🔍 解析中...";

    // 👉 從 QR 取得 code
    const url = new URL(decodedText);
    const code = url.searchParams.get("code") || decodedText;

    currentCode = code;

    document.getElementById("code").innerText = code;

    // 查券
    fetch(GAS_URL, {
      method: "POST",
      body: new URLSearchParams({
        type: "check",
        code: code
      })
    })
    .then(r => r.text())
    .then(t => JSON.parse(t))
    .then(data => {

      if(data.status !== "OK"){
        document.getElementById("msg").innerHTML = "❌ 查無此券";
        scanning = true;
        return;
      }

      document.getElementById("plate").innerText = data.plate;
      document.getElementById("msg").innerHTML = "✅ 可核銷";

    })
    .catch(err => {
      document.getElementById("msg").innerHTML = "❌ 載入失敗";
      scanning = true;
    });

  }
);

function redeem(){

  if(!currentCode){
    alert("沒有掃到CODE");
    return;
  }

  document.getElementById("msg").innerHTML = "⏳ 核銷中...";

  fetch(GAS_URL, {
    method: "POST",
    body: new URLSearchParams({
      type: "redeem",
      code: currentCode
    })
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "OK"){
      document.getElementById("msg").innerHTML = "🎉 核銷成功";
    }

    if(data.status === "USED"){
      document.getElementById("msg").innerHTML = "⚠️ 已使用";
    }

    if(data.status === "NOT_FOUND"){
      document.getElementById("msg").innerHTML = "❌ 查無券";
    }

    scanning = true;

  });

}

</script>

</body>
</html>
