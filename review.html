<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatCake 評論送30元折價券</title>

<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Kiwi Maru',"Microsoft JhengHei",sans-serif;
    background:
    radial-gradient(circle at top left,#fff3c9 0%,transparent 34%),
    radial-gradient(circle at top right,#ffdede 0%,transparent 32%),
    linear-gradient(180deg,#fffaf0,#fff0df);
    min-height:100vh;
    padding:20px;
    color:#6a3f29;
}

.container{max-width:700px;margin:auto;}

.card{
    background:white;
    border-radius:35px;
    padding:35px;
    text-align:center;
    border:3px solid #f6dcae;
    box-shadow:0 15px 35px rgba(0,0,0,.1);
}

.logo{font-size:48px;color:#7b4a32;}
.title{font-size:28px;color:#f08f8f;margin-top:10px;}

.desc{
    margin-top:20px;
    line-height:1.8;
    color:#6a3f29;
    font-size:18px;
}

.btn{
    display:block;
    width:100%;
    border:none;
    text-decoration:none;
    margin-top:15px;
    padding:18px;
    border-radius:22px;
    font-size:20px;
    cursor:pointer;
    font-family:inherit;
}

.btn:disabled{
    opacity:.65;
    cursor:not-allowed;
}

.reviewBtn{background:#FFD166;color:#5a341f;}
.claimBtn{background:#FF9F9F;color:white;}
.recoverBtn{background:#d9a86c;color:white;}

input{
    width:100%;
    padding:16px;
    margin-top:12px;
    border-radius:18px;
    border:2px solid #f0d6b2;
    font-size:18px;
    font-family:inherit;
}

#formArea,
#recoverArea,
#resultArea{
    display:none;
    margin-top:22px;
}

#qrcode{
    display:flex;
    justify-content:center;
    margin:20px 0;
}

.coupon{
    background:#fff6e9;
    border-radius:20px;
    padding:20px;
}

.code{
    font-size:24px;
    color:#d9785d;
    margin-top:10px;
    word-break:break-all;
}

.notice{
    margin-top:20px;
    line-height:1.8;
    color:#7a5238;
}

.smallNotice{
    margin-top:12px;
    font-size:15px;
    line-height:1.7;
    color:#9a7657;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="logo">CatCake</div>

<div class="title">
⭐⭐⭐⭐⭐ 評論送30元折價券
</div>

<div class="desc">
喜歡我們的甜點嗎？<br>
歡迎留下 Google 評論與照片<br>
出示評論給闆娘確認後，即可領取折價券 ❤️
</div>

<a id="reviewBtn" class="btn reviewBtn" target="_blank">
⭐ 前往 Google 評論
</a>

<button class="btn claimBtn" onclick="showForm()">
🎁 闆娘確認後，領取折價券
</button>

<button class="btn recoverBtn" onclick="showRecoverForm()">
🔍 找回我的折價券
</button>

<div id="formArea">

<input id="name" placeholder="請輸入姓名">

<input
id="phone"
type="text"
inputmode="numeric"
maxlength="10"
placeholder="請輸入手機號碼，例如 0988079393">

<input id="claimPassword" type="password" placeholder="請輸入店家領券密碼">

<div class="smallNotice">
此密碼由店家確認評論後輸入，避免重複或自行領取。
</div>

<button id="claimBtn" class="btn claimBtn" onclick="claimCoupon()">
領取30元折價券
</button>

</div>

<div id="recoverArea">

<input
id="recoverPhone"
type="text"
inputmode="numeric"
maxlength="10"
placeholder="請輸入手機號碼，例如 0988079393">

<button id="recoverBtn" class="btn recoverBtn" onclick="recoverCoupon()">
查詢我的折價券
</button>

</div>

<div id="resultArea">

<div class="coupon">

<h2>🎉 30元折價券</h2>

<div id="qrcode"></div>

<div class="code" id="couponCode"></div>

<div class="notice">
出示此 QR Code 給闆娘掃描，即可折抵30元
</div>

</div>

</div>

</div>
</div>

<script>
const GOOGLE_REVIEW_URL = "https://www.google.com/maps/place/Cat+Cake+%E6%89%8B%E4%BD%9CDIY%E8%9B%8B%E7%B3%95%E5%BA%97/@24.0712859,120.5300256,15.86z/data=!4m8!3m7!1s0x34693900073390fb:0x290bca681d121771!8m2!3d24.0715874!4d120.5307776!9m1!1b1!16s%2Fg%2F11vm2c1b_t!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDUyNy4wIKXMDSoASAFQAw%3D%3D";

const GAS_URL = "https://script.google.com/macros/s/AKfycbzSzVt5-1dvPWifeNDvYd8Ebm763XaJ6J9SehGBHenHSzR8hArH0tdgs_0V8n6HLo6q/exec";

const COUPON_USE_URL = "https://progessc01.github.io/liff-form/coupon-use";

document.getElementById("reviewBtn").href = GOOGLE_REVIEW_URL;

function cleanPhone(value){
    return String(value || "").replace(/\D/g,"").trim();
}

function makeCouponUrl(couponCode){
    return COUPON_USE_URL + "?coupon=" + encodeURIComponent(couponCode);
}

function showForm(){
    document.getElementById("formArea").style.display = "block";
    document.getElementById("recoverArea").style.display = "none";
}

function showRecoverForm(){
    document.getElementById("recoverArea").style.display = "block";
    document.getElementById("formArea").style.display = "none";
}

function showCoupon(couponCode){
    document.getElementById("resultArea").style.display = "block";
    document.getElementById("couponCode").innerHTML = couponCode;
    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"),{
        text:makeCouponUrl(couponCode),
        width:220,
        height:220
    });

    document.getElementById("resultArea").scrollIntoView({
        behavior:"smooth"
    });
}

async function claimCoupon(){

    const btn = document.getElementById("claimBtn");

    const name = document.getElementById("name").value.trim();
    const phone = cleanPhone(document.getElementById("phone").value);
    const claimPassword = document.getElementById("claimPassword").value.trim();

    if(!name){
        alert("請輸入姓名");
        return;
    }

    if(!/^09\d{8}$/.test(phone)){
        alert("請輸入正確手機號碼，例如 0988079393");
        return;
    }

    if(!claimPassword){
        alert("請輸入店家領券密碼");
        return;
    }

    btn.disabled = true;
    btn.innerText = "領取中...";

    try{
        const res = await fetch(GAS_URL,{
            method:"POST",
            body:JSON.stringify({
                action:"claimReviewCoupon",
                name:name,
                phone:phone,
                claimPassword:claimPassword
            })
        });

        const data = await res.json();

        if(data.status !== "OK"){
            alert(data.message || "領取失敗");
            btn.disabled = false;
            btn.innerText = "領取30元折價券";
            return;
        }

        showCoupon(data.couponCode);
        btn.innerText = "已產生折價券";

    }catch(err){
        alert("系統忙碌中，請稍後再試");
        btn.disabled = false;
        btn.innerText = "領取30元折價券";
    }
}

async function recoverCoupon(){

    const btn = document.getElementById("recoverBtn");
    const phone = cleanPhone(document.getElementById("recoverPhone").value);

    if(!/^09\d{8}$/.test(phone)){
        alert("請輸入正確手機號碼，例如 0988079393");
        return;
    }

    btn.disabled = true;
    btn.innerText = "查詢中...";

    try{
        const res = await fetch(GAS_URL,{
            method:"POST",
            body:JSON.stringify({
                action:"recoverCoupon",
                phone:phone
            })
        });

        const data = await res.json();

        if(data.status !== "OK"){
            alert(data.message || "找不到折價券");
            btn.disabled = false;
            btn.innerText = "查詢我的折價券";
            return;
        }

        showCoupon(data.couponCode);
        btn.disabled = false;
        btn.innerText = "查詢我的折價券";

    }catch(err){
        alert("查詢失敗，請稍後再試");
        btn.disabled = false;
        btn.innerText = "查詢我的折價券";
    }
}
</script>

</body>
</html>
