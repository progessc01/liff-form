<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工排休系統</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f3f4f6;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      color: #111827;
    }

    .box {
      max-width: 520px;
      margin: auto;
      background: #fff;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      margin-top: 18px;
      cursor: pointer;
    }

    .secondary {
      background: #6b7280;
    }

    .danger {
      background: #dc2626;
    }

    .hidden {
      display: none;
    }

    .msg {
      margin-top: 14px;
      text-align: center;
      font-weight: bold;
      color: #dc2626;
      line-height: 1.5;
    }

    .success {
      color: #16a34a;
    }

    .info {
      margin-top: 14px;
      background: #eef6ff;
      padding: 12px;
      border-radius: 8px;
      line-height: 1.7;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .day-name {
      text-align: center;
      font-weight: bold;
      color: #555;
      font-size: 14px;
    }

    .day {
      text-align: center;
      padding: 10px 4px;
      border-radius: 8px;
      background: #f1f5f9;
      cursor: pointer;
      border: 1px solid transparent;
      user-select: none;
    }

    .day.weekend {
      background: #fff7ed;
    }

    .day.selected {
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    .day.weekend.selected {
      background: #f97316;
      color: white;
    }

    .day.disabled {
      background: #e5e7eb;
      color: #999;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .linkBtn {
      background: none;
      color: #2563eb;
      border: none;
      padding: 0;
      margin-top: 14px;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>員工排休登入</h2>

  <label>帳號</label>
  <input type="text" id="loginAccount" placeholder="請輸入帳號">

  <label>密碼</label>
  <input type="password" id="loginPassword" placeholder="請輸入密碼">

  <button onclick="login()">登入</button>

  <button class="linkBtn" onclick="showRegister()">沒有帳號？立即註冊</button>

  <div class="msg" id="loginMsg"></div>
</div>

<div class="box hidden" id="registerBox">
  <h2>員工註冊</h2>

  <label>姓名</label>
  <input type="text" id="regName" placeholder="請輸入姓名">

  <label>手機</label>
  <input type="text" id="regPhone" placeholder="請輸入手機">

  <label>帳號</label>
  <input type="text" id="regAccount" placeholder="請設定帳號">

  <label>密碼</label>
  <input type="password" id="regPassword" placeholder="請設定密碼">

  <label>確認密碼</label>
  <input type="password" id="regPassword2" placeholder="請再次輸入密碼">

  <button onclick="registerEmployee()">送出註冊</button>
  <button class="secondary" onclick="showLogin()">返回登入</button>

  <div class="msg" id="registerMsg"></div>
</div>

<div class="box hidden" id="shiftBox">
  <h2>員工排休系統</h2>

  <div class="info">
    員工：<span id="empName"></span><br>
    排休月份：<span id="targetMonth"></span><br>
    規則：每人每月最多排休 4 天；平日一天最多 1 人休；假日可多人休。
  </div>

  <div class="calendar">
    <div class="day-name">日</div>
    <div class="day-name">一</div>
    <div class="day-name">二</div>
    <div class="day-name">三</div>
    <div class="day-name">四</div>
    <div class="day-name">五</div>
    <div class="day-name">六</div>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="info">
    已選休假：<span id="selectedCount">0</span> / 4 天
  </div>

  <button onclick="submitRestDays()">送出排休</button>
  <button class="secondary" onclick="logout()">登出</button>

  <div class="msg" id="shiftMsg"></div>
</div>

<script>
  let currentEmployee = null;
  let monthData = null;
  let selectedDays = [];

  function showLogin() {
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("shiftBox").classList.add("hidden");
    clearMessages();
  }

  function showRegister() {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
    document.getElementById("shiftBox").classList.add("hidden");
    clearMessages();
  }

  function clearMessages() {
    document.getElementById("loginMsg").textContent = "";
    document.getElementById("registerMsg").textContent = "";
    document.getElementById("shiftMsg").textContent = "";
  }

  function login() {
    const account = document.getElementById("loginAccount").value.trim();
    const password = document.getElementById("loginPassword").value.trim();
    const msg = document.getElementById("loginMsg");

    msg.classList.remove("success");
    msg.textContent = "";

    if (!account || !password) {
      msg.textContent = "請輸入帳號與密碼";
      return;
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res.success) {
          msg.textContent = res.message || "登入失敗";
          return;
        }

        currentEmployee = res.employee;

        document.getElementById("empName").textContent = currentEmployee.name;
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("registerBox").classList.add("hidden");
        document.getElementById("shiftBox").classList.remove("hidden");

        loadMonthData();
      })
      .withFailureHandler(function(err) {
        msg.textContent = "系統錯誤：" + err.message;
      })
      .shiftEmployeeLogin(account, password);
  }

  function registerEmployee() {
    const name = document.getElementById("regName").value.trim();
    const phone = document.getElementById("regPhone").value.trim();
    const account = document.getElementById("regAccount").value.trim();
    const password = document.getElementById("regPassword").value.trim();
    const password2 = document.getElementById("regPassword2").value.trim();
    const msg = document.getElementById("registerMsg");

    msg.classList.remove("success");
    msg.textContent = "";

    if (!name || !phone || !account || !password || !password2) {
      msg.textContent = "請完整填寫註冊資料";
      return;
    }

    if (password !== password2) {
      msg.textContent = "兩次密碼輸入不一致";
      return;
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res.success) {
          msg.textContent = res.message || "註冊失敗";
          return;
        }

        msg.classList.add("success");
        msg.textContent = "註冊成功，請返回登入";

        document.getElementById("regName").value = "";
        document.getElementById("regPhone").value = "";
        document.getElementById("regAccount").value = "";
        document.getElementById("regPassword").value = "";
        document.getElementById("regPassword2").value = "";
      })
      .withFailureHandler(function(err) {
        msg.textContent = "系統錯誤：" + err.message;
      })
      .shiftRegisterEmployee({
        name: name,
        phone: phone,
        account: account,
        password: password
      });
  }

  function loadMonthData() {
    const msg = document.getElementById("shiftMsg");
    msg.classList.remove("success");
    msg.textContent = "載入排休資料中...";

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res.success) {
          msg.textContent = res.message || "載入失敗";
          return;
        }

        monthData = res;
        selectedDays = res.myRestDays || [];

        document.getElementById("targetMonth").textContent = res.monthName;

        renderCalendar();
        updateSelectedCount();

        msg.textContent = "";
      })
      .withFailureHandler(function(err) {
        msg.textContent = "系統錯誤：" + err.message;
      })
      .shiftGetMonthData(currentEmployee.employeeId);
  }

  function renderCalendar() {
    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const year = monthData.year;
    const month = monthData.month;
    const daysInMonth = monthData.daysInMonth;
    const firstDay = new Date(year, month - 1, 1).getDay();

    for (let i = 0; i < firstDay; i++) {
      calendar.appendChild(document.createElement("div"));
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const date = new Date(year, month - 1, day);
      const week = date.getDay();
      const isWeekend = week === 0 || week === 6;
      const isSelected = selectedDays.includes(day);
      const isBlocked = monthData.blockedWeekdays.includes(day);

      const div = document.createElement("div");
      div.className = "day";
      div.textContent = day;

      if (isWeekend) div.classList.add("weekend");
      if (isSelected) div.classList.add("selected");

      if (!isWeekend && isBlocked && !isSelected) {
        div.classList.add("disabled");
      } else {
        div.onclick = function() {
          toggleDay(day);
        };
      }

      calendar.appendChild(div);
    }
  }

  function toggleDay(day) {
    const index = selectedDays.indexOf(day);

    if (index >= 0) {
      selectedDays.splice(index, 1);
    } else {
      if (selectedDays.length >= 4) {
        showShiftMsg("最多只能排休 4 天");
        return;
      }
      selectedDays.push(day);
    }

    selectedDays.sort(function(a, b) {
      return a - b;
    });

    renderCalendar();
    updateSelectedCount();
    showShiftMsg("");
  }

  function updateSelectedCount() {
    document.getElementById("selectedCount").textContent = selectedDays.length;
  }

  function submitRestDays() {
    const msg = document.getElementById("shiftMsg");
    msg.classList.remove("success");

    if (!currentEmployee) {
      showShiftMsg("請重新登入");
      return;
    }

    if (selectedDays.length > 4) {
      showShiftMsg("最多只能排休 4 天");
      return;
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res.success) {
          showShiftMsg(res.message || "送出失敗");
          return;
        }

        msg.classList.add("success");
        msg.textContent = "排休已送出成功";
        loadMonthData();
      })
      .withFailureHandler(function(err) {
        showShiftMsg("系統錯誤：" + err.message);
      })
      .shiftSubmitRestDays(currentEmployee.employeeId, selectedDays);
  }

  function logout() {
    currentEmployee = null;
    monthData = null;
    selectedDays = [];

    document.getElementById("loginAccount").value = "";
    document.getElementById("loginPassword").value = "";

    showLogin();
  }

  function showShiftMsg(text) {
    const msg = document.getElementById("shiftMsg");
    msg.classList.remove("success");
    msg.textContent = text;
  }
</script>

</body>
</html>
