<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理登入</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>管理登入</h1>

  <input type="text" id="account" placeholder="請輸入管理帳號">

  <br><br>

  <input type="password" id="password" placeholder="請輸入管理密碼">

  <br><br>

  <button type="button" onclick="adminLogin()">
    登入
  </button>

  <button type="button" onclick="location.href='vip.html'">
    返回首頁
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const params = new URLSearchParams(window.location.search);

const targetPage = params.get("page");

function adminLogin() {

  const account = document.getElementById("account").value.trim();

  const password = document.getElementById("password").value.trim();

  const result = document.getElementById("result");

  if(!account || !password) {

    alert("請輸入帳號與密碼");

    return;
  }

  result.innerHTML = "⏳ 登入中...";

  const form = new URLSearchParams();

  form.append("type", "adminLogin");

  form.append("account", account);

  form.append("password", password);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {

      result.innerHTML = "❌ 帳號或密碼錯誤";

      return;
    }

    localStorage.setItem("adminAccount", data.account);

    localStorage.setItem("adminRole", data.role);

    // 根據 page 跳轉
    if(targetPage === "refund") {

      location.href = "vip-refund-list.html";

      return;
    }

    if(targetPage === "abnormal") {

      location.href = "vip-abnormal.html";

      return;
    }

    result.innerHTML = "❌ 未指定頁面";

  })
  .catch(err => {

    console.log(err);

    result.innerHTML = "❌ 系統錯誤";

  });

}

</script>

</body>
</html>
