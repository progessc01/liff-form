<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員資料查詢</title>
  <link rel="stylesheet" href="vip-style.css">
</head>
<body>

<div class="container">

  <h1>會員資料查詢</h1>

  <input type="text" id="keyword" placeholder="請輸入姓名或手機號碼">

  <br><br>

  <button type="button" onclick="searchCustomer()">查詢</button>

  <button type="button" onclick="location.href='vip.html'">
    返回首頁
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function searchCustomer() {

  const keyword = document.getElementById("keyword").value.trim();
  const result = document.getElementById("result");

  if(!keyword) {
    alert("請輸入姓名或手機號碼");
    return;
  }

  result.innerHTML = "⏳ 查詢中...";

  const form = new URLSearchParams();
  form.append("type", "searchCustomer");
  form.append("keyword", keyword);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {
      result.innerHTML = "❌ 查詢失敗";
      return;
    }

    const rows = data.rows || [];

    if(rows.length === 0) {
      result.innerHTML = `
        <div class="card">
          <h2>查無資料</h2>
          <p>請確認姓名或手機號碼是否正確。</p>
        </div>
      `;
      return;
    }

    let html = `
      <div class="card" style="text-align:left;">
        <h2>查詢結果</h2>
        <p>共找到 ${rows.length} 筆會員資料</p>
      </div>
    `;

    rows.forEach((c, index) => {

      html += `
        <div class="card" style="text-align:left;">
          <h2>會員 #${index + 1}</h2>

          <p><b>姓名：</b>${c.name || ""}</p>
          <p><b>手機：</b>${c.phone || ""}</p>
          <p><b>密碼：</b>${c.password || ""}</p>
          <p><b>狀態：</b>${c.status || ""}</p>

          <hr>

          <p><b>車牌1：</b>${c.plate1 || ""}</p>
          <p><b>車牌2：</b>${c.plate2 || ""}</p>
          <p><b>車牌3：</b>${c.plate3 || ""}</p>
          <p><b>車牌4：</b>${c.plate4 || ""}</p>
          <p><b>車牌5：</b>${c.plate5 || ""}</p>
        </div>
      `;
    });

    result.innerHTML = html;

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "❌ 系統錯誤";
  });

}

</script>

</body>
</html>
