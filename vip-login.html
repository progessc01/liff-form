<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門市授權登入</title>
<link rel="stylesheet" href="vip-style.css">
<link rel="manifest" href="vip-manifest.json">

<meta name="theme-color"
      content="#0f75bc">

<link rel="apple-touch-icon"
      href="ajlogo.jpg">

<meta name="apple-mobile-web-app-capable"
      content="yes">

<meta name="apple-mobile-web-app-title"
      content="安建後台">
</head>
<body>

<div class="container">

  <h1>安建洗車 VIP管理系統</h1>
      <h2>門市授權登入</h2>

<select id="storeCode">

  <option value="">
    請選擇分店
  </option>

  <option value="AJ01">
    AJ01 總店
  </option>

  <option value="AJ02">
    AJ02 員林店
  </option>

  <option value="AJ03">
    AJ03 彰南店
  </option>

  <option value="AJ04">
    AJ04 山福店
  </option>

</select>

  <br><br>

<input
  type="text"
  id="staffNo"
  inputmode="numeric"
  autocomplete="username"
  placeholder="請輸入工號，例如：001"
>

  <br><br>

<input type="password" id="password" placeholder="請輸入員工密碼">

  <br><br>

  <button id="loginBtn" onclick="login()">
  登入
</button>
<br><br>

<button type="button" onclick="location.href='vip-staff-register.html'">
  員工註冊申請
</button>

  

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function login() {

  const storeCode =
    document.getElementById("storeCode").value.trim();

  const staffNoRaw =
    document.getElementById("staffNo").value.trim();

  const password =
    document.getElementById("password").value.trim();

  const btn =
    document.getElementById("loginBtn");

  if(!storeCode || !staffNoRaw || !password) {
    alert("請完整輸入分店、工號與密碼");
    return;
  }

  const staffNo =
    staffNoRaw.padStart(3, "0");

  const account =
    storeCode + "-" + staffNo;

  btn.disabled = true;
  btn.innerText = "登入中...";

  const form = new URLSearchParams();

  form.append("type", "loginStaff");
  form.append("account", account);
  form.append("password", password);

  fetch(GAS_URL,{
    method:"POST",
    body:form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {

      btn.disabled = false;
      btn.innerText = "登入";

      alert("工號或密碼錯誤");
      return;
    }

    localStorage.setItem(
      "staffAccount",
      data.account || account
    );

    localStorage.setItem(
      "staffName",
      data.staffName || ""
    );

    localStorage.setItem(
      "storeCode",
      data.storeCode || storeCode
    );

    localStorage.setItem(
      "storeName",
      data.storeName || ""
    );

    localStorage.setItem(
      "staffRole",
      data.role || ""
    );

    location.href = "vip.html";

  })
  .catch(err => {

    btn.disabled = false;
    btn.innerText = "登入";

    alert("登入失敗，請稍後再試");

    console.log(err);

  });

}
</script>

</body>
</html>
