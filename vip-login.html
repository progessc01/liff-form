<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門市授權登入</title>
<link rel="stylesheet" href="vip-style.css">
<link rel="manifest" href="vip-manifest.json">

<meta name="theme-color"
      content="#0f75bc">

<link rel="apple-touch-icon"
      href="ajlogo.jpg">

<meta name="apple-mobile-web-app-capable"
      content="yes">

<meta name="apple-mobile-web-app-title"
      content="安建後台">
</head>
<body>

<div class="container">

  <h1>安建洗車 VIP管理系統</h1>
      <h2>門市授權登入</h2>

<select id="account">

  <option value="">
    請選擇分店
  </option>

  <option value="AJ01">
    AJ01 總店
  </option>

  <option value="AJ02">
    AJ02 員林店
  </option>

  <option value="AJ03">
    AJ03 彰南店
  </option>

  <option value="AJ04">
    AJ04 山福店
  </option>

</select>

  <br><br>

<input type="password" id="password" placeholder="請輸入員工密碼">

  <br><br>

  <button onclick="login()">登入</button>
<br><br>

<button type="button" onclick="location.href='vip-staff-register.html'">
  員工註冊申請
</button>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function login() {

  const account = document.getElementById("account").value.trim();
  const password = document.getElementById("password").value.trim();
  const result = document.getElementById("result");

  if(!account || !password) {
    alert("請輸入帳號與密碼");
    return;
  }

  result.innerHTML = "登入中...";

  const form = new URLSearchParams();
  form.append("type", "loginStaff");
  form.append("account", account);
  form.append("password", password);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {
      result.innerHTML = "❌ 帳號或密碼錯誤";
      return;
    }

    localStorage.setItem("staffAccount", data.account);
localStorage.setItem("staffName", data.staffName);
    localStorage.setItem("storeCode", data.storeCode);
    localStorage.setItem("storeName", data.storeName);

    location.href = "vip.html";

  })
  .catch(err => {
    result.innerHTML = "❌ 登入失敗，請稍後再試";
    console.log(err);
  });

}

</script>

</body>
</html>
