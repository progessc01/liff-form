<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車號查詢</title>
  <link rel="stylesheet" href="vip-style.css">
</head>
<body>

<div class="container">

  <h1>車號查詢</h1>

  <input type="text" id="plate" placeholder="請輸入車牌號碼">

  <br><br>

  <button type="button" onclick="searchByPlate()">查詢</button>

  <button type="button" onclick="location.href='vip.html'">返回首頁</button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function searchByPlate() {

  const plate = document.getElementById("plate").value.trim().toUpperCase();
  const result = document.getElementById("result");

  if(!plate) {
    alert("請輸入車牌號碼");
    return;
  }

  result.innerHTML = "⏳ 查詢中...";

  const form = new URLSearchParams();
  form.append("type", "searchByPlate");
  form.append("plate", plate);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "NOT_FOUND") {
      result.innerHTML = "❌ 查無此車牌";
      return;
    }

    if(data.status !== "OK") {
      result.innerHTML = "❌ 查詢失敗";
      return;
    }

    const customer = data.customer;
    const cards = data.cards || [];

    let html = `
      <div class="card" style="text-align:left;">
        <h2>車主資料</h2>
        <p><b>姓名：</b>${customer.name}</p>
        <p><b>手機：</b>${customer.phone}</p>
        <p><b>車牌1：</b>${customer.plate1 || ""}</p>
        <p><b>車牌2：</b>${customer.plate2 || ""}</p>
        <p><b>車牌3：</b>${customer.plate3 || ""}</p>
        <p><b>車牌4：</b>${customer.plate4 || ""}</p>
        <p><b>車牌5：</b>${customer.plate5 || ""}</p>
      </div>
    `;

    html += `
      <div class="card" style="text-align:left;">
        <h2>VIP卡片</h2>
    `;

    if(cards.length === 0) {
      html += `<p>此車主目前沒有綁定 VIP 卡</p>`;
    } else {
      cards.forEach(c => {
        html += `
          <div style="border-bottom:1px solid #ddd; padding:10px 0;">
            <p><b>卡號：</b>${c.cardNo}</p>
            <p><b>狀態：</b>${c.status}</p>
            <p><b>車型：</b>${c.vehicleType}</p>
            <p><b>服務：</b>${c.packageType}</p>
            <p><b>總次數：</b>${c.totalTimes}</p>
            <p><b>剩餘次數：</b>${c.remainingTimes}</p>
          </div>
        `;
      });
    }

    html += `</div>`;

    result.innerHTML = html;

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "❌ 系統錯誤";
  });

}

</script>

</body>
</html>
