<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退款核准</title>
<link rel="stylesheet" href="vip-style.css">
</head>
<body>

<div class="container">

  <h1>退款核准</h1>

  <div id="content">讀取中...</div>

  <br>

  <button type="button" onclick="location.href='vip.html'">
    返回首頁
  </button>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const adminAccount = localStorage.getItem("adminAccount");

if(!adminAccount) {
  alert("請先登入管理系統");
  location.href = "vip-admin-login.html?page=refund";
}

const content = document.getElementById("content");

loadRefunds();

function loadRefunds() {

  content.innerHTML = "⏳ 讀取退款資料中...";

  const form = new URLSearchParams();
  form.append("type", "getRefundList");

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {
      content.innerHTML = "❌ 查詢失敗";
      return;
    }

    const rows = data.rows || [];

    if(rows.length === 0) {
      content.innerHTML = `
        <div class="card">
          <h2>目前沒有退款申請</h2>
        </div>
      `;
      return;
    }

    let html = "";

    rows.forEach((r, index) => {

      html += `
        <div class="card" style="text-align:left; margin-bottom:15px;">

          <h3>退款申請 #${rows.length - index}</h3>

          <p><b>卡號：</b>${r.cardNo}</p>

          <p><b>申請時間：</b>${formatTime(r.time)}</p>

          <p><b>申請分店：</b>${r.applyStore} ${r.storeName}</p>

          <p><b>員工：</b>${r.staffAccount}</p>

          <p><b>退款原因：</b>${r.reason}</p>

          <p><b>銀行代碼：</b>${r.bankCode || ""}</p>

          <p><b>銀行帳號：</b>${r.bankAccount || ""}</p>

          <hr>

          <p><b>原購買金額：</b>${r.amount} 元</p>

          <p><b>總次數：</b>${r.totalTimes}</p>

          <p><b>剩餘次數：</b>${r.remainingTimes}</p>

          <p style="font-size:20px; color:red;">
            <b>應退款金額：</b>${r.refundAmount} 元
          </p>

          <hr>

          <p><b>目前狀態：</b>${r.status}</p>

          <p><b>核准結果：</b>${r.approveResult || "待審核"}</p>

          <p><b>核准時間：</b>${r.approveTime ? formatTime(r.approveTime) : "尚未核准"}</p>

          ${
            r.status === "待審核"
            ? `
              <textarea id="reason_${index}" placeholder="核准或駁回原因"></textarea>

              <br><br>

              <button type="button" onclick="approveRefund('${r.cardNo}', '${index}')">
                核准退款
              </button>

              <button type="button" onclick="rejectRefund('${r.cardNo}', '${index}')">
                駁回退款
              </button>
            `
            : ""
          }

        </div>
      `;
    });

    content.innerHTML = html;

  })
  .catch(err => {
    console.log(err);
    content.innerHTML = "❌ 系統錯誤";
  });

}

function approveRefund(cardNo, index) {

  const reason = document.getElementById("reason_" + index).value.trim();

  if(!reason) {
    alert("請輸入核准原因");
    return;
  }

  if(!confirm("確認核准此退款？")) return;

  updateRefund(cardNo, "已核准", reason);
}

function rejectRefund(cardNo, index) {

  const reason = document.getElementById("reason_" + index).value.trim();

  if(!reason) {
    alert("請輸入駁回原因");
    return;
  }

  if(!confirm("確認駁回此退款？")) return;

  updateRefund(cardNo, "已駁回", reason);
}

function updateRefund(cardNo, approveResult, reason) {

  const form = new URLSearchParams();

  form.append("type", "updateRefund");
  form.append("cardNo", cardNo);
  form.append("approveResult", approveResult);
  form.append("reason", reason);
  form.append("adminAccount", adminAccount);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {
      alert("更新失敗");
      return;
    }

    alert("已更新退款狀態");

    loadRefunds();

  })
  .catch(err => {
    console.log(err);
    alert("系統錯誤");
  });
}

function formatTime(dateStr) {

  if(!dateStr) return "";

  const d = new Date(dateStr);

  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const day = d.getDate();

  let hour = d.getHours();
  const minute = String(d.getMinutes()).padStart(2, "0");

  let period = "上午";

  if(hour >= 12) period = "下午";
  if(hour >= 18) period = "晚上";

  let displayHour = hour;

  if(displayHour > 12) displayHour -= 12;
  if(displayHour === 0) displayHour = 12;

  return `${year}年${month}月${day}日 ${period} ${displayHour}:${minute}`;
}

</script>

</body>
</html>
