<!-- vip-refund-list.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退款查詢</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>退款查詢</h1>

  <div id="content">讀取中...</div>

  <br>

  <button type="button" onclick="location.href='vip.html'">
    返回首頁
  </button>

</div>

<script>

const adminAccount = localStorage.getItem("adminAccount");

if(!adminAccount) {

  alert("請先登入管理系統");

  location.href = "vip-admin-login.html?page=refund";
}

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const content = document.getElementById("content");

loadRefunds();

function loadRefunds() {

  content.innerHTML = "⏳ 讀取中...";

  const form = new URLSearchParams();

  form.append("type", "getRefundList");

  fetch(GAS_URL, {
    method:"POST",
    body:form
  })
  .then(r=>r.text())
  .then(t=>JSON.parse(t))
  .then(data=>{

    if(data.status !== "OK") {

      content.innerHTML = "❌ 查詢失敗";

      return;
    }

    const rows = data.rows || [];

    if(rows.length === 0) {

      content.innerHTML = "目前沒有退款申請";

      return;
    }

    let html = "";

    rows.forEach(r=>{

      html += `
        <div class="card" style="text-align:left; margin-bottom:15px;">

          <p><b>卡號：</b>${r.cardNo}</p>

          <p><b>申請時間：</b>${formatTime(r.time)}</p>

          <p><b>退款原因：</b>${r.reason}</p>

          <p><b>銀行帳號：</b>${r.bankAccount}</p>

          <p><b>申請分店：</b>${r.applyStore} ${r.storeName}</p>

          <p><b>員工：</b>${r.staffAccount}</p>

          <p><b>狀態：</b>${r.status}</p>

          <p><b>總店核准：</b>${r.approveResult || "待審核"}</p>

        </div>
      `;
    });

    content.innerHTML = html;

  })
  .catch(err=>{

    console.log(err);

    content.innerHTML = "❌ 系統錯誤";

  });

}

function formatTime(dateStr) {

  const d = new Date(dateStr);

  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const day = d.getDate();

  let hour = d.getHours();
  const minute = String(d.getMinutes()).padStart(2, "0");

  let period = "上午";

  if(hour >= 12) period = "下午";
  if(hour >= 18) period = "晚上";

  let displayHour = hour;

  if(displayHour > 12) displayHour -= 12;
  if(displayHour === 0) displayHour = 12;

  return `${year}年${month}月${day}日 ${period} ${displayHour}:${minute}`;
}

</script>

</body>
</html>
