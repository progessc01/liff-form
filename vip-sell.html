<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我要賣卡</title>
  <link rel="stylesheet" href="vip-style.css">
</head>
<body>

<div class="container">

  <h1>我要賣卡</h1>

  <div class="info-box">
    <div>目前登入分店：</div>
    <strong id="storeInfo">讀取中...</strong>

    <br><br>

    <div>操作人員：</div>
    <strong id="staffInfo">讀取中...</strong>
  </div>

  <select id="vehicleType">
    <option value="">選擇車型</option>
    <option value="轎車">轎車</option>
    <option value="休旅車">休旅車</option>
    <option value="箱型車">箱型車</option>
    <option value="箱型車加大">箱型車加大</option>
    <option value="箱型車特大">箱型車特大</option>
  </select>

  <br><br>

  <select id="packageCount">
    <option value="">選擇購買方案</option>
    <option value="11">買10送1（共11次）</option>
    <option value="12">買10送2（共12次）</option>
  </select>

  <br><br>

<select id="packageType">
  <option value="">選擇服務</option>
  <option value="A套餐-奈米鍍膜+預洗+蟲屍">A套餐-奈米鍍膜+預洗+蟲屍</option>
  <option value="B套餐-奈米鍍膜+預洗+輪胎油">B套餐-奈米鍍膜+預洗+輪胎油</option>
  <option value="C套餐-奈米鍍膜+預洗+除油膜">C套餐-奈米鍍膜+預洗+除油膜</option>
  <option value="D套餐-奈米鍍膜+預洗+除柏油">D套餐-奈米鍍膜+預洗+除柏油</option>
  <option value="彩虹瀑布">彩虹瀑布</option>
  <option value="奈米鍍膜">奈米鍍膜</option>
</select>

  <br><br>

  <div style="display:flex; align-items:center; gap:15px;">
    <span>今日是否使用：</span>

   <label>
  <input type="radio" name="todayUse" value="yes" checked>
  是
</label>

<label>
  <input type="radio" name="todayUse" value="no">
  否
</label>
  </div>

  <br><br>

  <select id="payMethod">
    <option value="">付款方式</option>
    <option value="現金">現金</option>
    <option value="LINE PAY">LINE PAY</option>
  </select>

  <br><br>

  <select id="invoiceType">
    <option value="">是否開發票</option>
    <option value="Y">有開發票</option>
    <option value="N">未開發票</option>
  </select>

  <br><br>

  <div id="priceSuggest" class="info-box">
    請選擇車型與服務，系統會自動顯示建議售價
  </div>

  <br>

  <input type="number" id="amount" placeholder="實際收款金額">

  <br><br>

  <button type="button" onclick="createCard()">
    建立會員卡
  </button>

  <button type="button" onclick="location.href='vip.html'">
    返回首頁
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const storeCode =
  localStorage.getItem("storeCode");

const storeName =
  localStorage.getItem("storeName");

const staffName =
  localStorage.getItem("staffName");

const staffAccount =
  localStorage.getItem("staffAccount");

if(!storeCode) {

  alert("請先登入");

  location.href = "vip-login.html";
}

document.getElementById("storeInfo").innerText =
  storeCode + " " + (storeName || "");

document.getElementById("staffInfo").innerText =
  staffName || "";

// ========================
// 建議售價
// ========================

document.getElementById("vehicleType")
  .addEventListener("change", updateSuggest);

document.getElementById("packageType")
  .addEventListener("change", updateSuggest);

function updateSuggest() {

  const vehicle =
    document.getElementById("vehicleType").value;

  const service =
    document.getElementById("packageType").value;

  const box =
    document.getElementById("priceSuggest");

  if(!vehicle || !service) {

    box.innerHTML =
      "請選擇車型與服務";

    return;
  }

  let basePrice = 0;

  let vehicleAdd = 0;

  if(vehicle === "休旅車") vehicleAdd = 50;
  if(vehicle === "箱型車") vehicleAdd = 100;
  if(vehicle === "箱型車加大") vehicleAdd = 150;
  if(vehicle === "箱型車特大") vehicleAdd = 200;

  // 彩虹瀑布
  if(service === "彩虹瀑布") {

    if(
      vehicle === "箱型車" ||
      vehicle === "箱型車加大" ||
      vehicle === "箱型車特大"
    ) {

      box.innerHTML = `
        <span class="danger">
          箱型車以上不可選彩虹瀑布
        </span>
      `;

      return;
    }

    basePrice = 280 + vehicleAdd;
  }

  // 奈米鍍膜
  else if(service === "奈米鍍膜") {

    basePrice = 330 + vehicleAdd;
  }

  // A/B/D
  else if(
  service.includes("A套餐") ||
  service.includes("B套餐") ||
  service.includes("D套餐")
) {

    basePrice = 400 + vehicleAdd;
  }

  // C
  else if(service.includes("C套餐")) {

    basePrice = 450 + vehicleAdd;
  }

  const vipPrice = basePrice * 10;

  box.innerHTML = `
    <div style="font-size:18px;">
      建議售價：

      <span style="
        color:#0f75bc;
        font-weight:bold;
        font-size:26px;
      ">
        ${vipPrice}
      </span>

      元
    </div>

    <div class="small-text">
      單次洗車：${basePrice} 元
    </div>
  `;
}

// ========================
// 建立卡片
// ========================

function createCard() {

  const vehicle =
    document.getElementById("vehicleType").value;

  const packageCount =
    document.getElementById("packageCount").value;

  const packageType =
    document.getElementById("packageType").value;

  const pay =
    document.getElementById("payMethod").value;

  const invoiceType =
    document.getElementById("invoiceType").value;

  const amount =
    document.getElementById("amount").value;

  const todayUse =
    document.querySelector(
      'input[name="todayUse"]:checked'
    ).value;

  const result =
    document.getElementById("result");

  if(
    !vehicle ||
    !packageCount ||
    !packageType ||
    !pay ||
    !invoiceType ||
    !amount
  ) {

    alert("請填寫完整資料");

    return;
  }

  result.innerHTML = "⏳ 建立中...";

  const form = new URLSearchParams();

  form.append("type", "createCard");
  form.append("sellStore", storeCode);
  form.append("storeName", storeName || "");
  form.append("staffAccount", staffAccount || "");
  form.append("vehicleType", vehicle);
  form.append("packageCount", packageCount);
  form.append("packageType", packageType);
  form.append("todayUse", todayUse);
  form.append("payMethod", pay);
  form.append("invoiceType", invoiceType);
  form.append("amount", amount);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {

      result.innerHTML =
        "❌ 建立失敗：" +
        (data.message || "");

      return;
    }

    const invoiceText =
      invoiceType === "Y"
      ? "有開發票"
      : "未開發票";

    result.innerHTML = `
      <div class="card">

        <h2>✅ 卡片建立成功</h2>

        <p><b>取卡代碼：</b>${data.cardNo}</p>

        <p><b>售卡分店：</b>
          ${storeCode} ${storeName || ""}
        </p>

        <p><b>操作人員：</b>
          ${staffName || ""}
        </p>

        <p><b>車型：</b>${vehicle}</p>

        <p><b>服務：</b>${packageType}</p>

        <p><b>總次數：</b>${data.totalTimes}</p>

        <p><b>剩餘次數：</b>${data.remainingTimes}</p>

        <p><b>付款方式：</b>${pay}</p>

        <p><b>是否開發票：</b>${invoiceText}</p>

        <p><b>售卡金額：</b>
          ${data.amount} 元
        </p>

        <p><b>進池比例：</b>
          ${data.poolRate}
        </p>

        <p><b>進池金額：</b>
          ${data.poolAmount} 元
        </p>

        <p><b>每次核銷價值：</b>
          ${data.unitValue} 元
        </p>

        <p class="danger">
          請提供此代碼給客戶取卡
        </p>

      </div>
    `;
  })
  .catch(err => {

    result.innerHTML =
      "❌ 系統錯誤，請稍後再試";

    console.log(err);
  });

}

</script>

</body>
</html>
