<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我要賣卡</title>
  <link rel="stylesheet" href="vip-style.css">
</head>
<body>

<div class="container">

  <h1>我要賣卡</h1>

  <div class="info-box">
    <div>目前登入分店：</div>
    <strong id="storeInfo">讀取中...</strong>
    <br><br>
    <div>操作人員：</div>
    <strong id="staffInfo">讀取中...</strong>
  </div>

  <select id="vehicleType">
    <option value="">選擇車型</option>
    <option value="轎車">轎車</option>
    <option value="休旅車">休旅車</option>
    <option value="箱型車">箱型車</option>
    <option value="箱型車加大">箱型車加大</option>
    <option value="箱型車特大">箱型車特大</option>
  </select>

  <br><br>

  <select id="packageCount">
    <option value="">選擇購買方案</option>
    <option value="11">買10送1（共11次）</option>
    <option value="12">買10送2（共12次）</option>
  </select>

  <br><br>

  <select id="baseService">
    <option value="">選擇基本服務</option>
    <option value="炫彩泡泡">炫彩泡泡</option>
    <option value="奈米鍍膜">奈米鍍膜 +50</option>
  </select>

  <br><br>

  <select id="quickPackage">
    <option value="">快速選擇套餐（可不選）</option>
    <option value="CARE">貼心套餐：蟲屍 / 輪胎油 / 除柏油任選</option>
    <option value="C">C套餐：奈米鍍膜+泡沫預洗+除油膜</option>
  </select>

  <br><br>

  <div class="card" style="text-align:left;">
    <h2>加購項目</h2>

    <label><input type="checkbox" class="addon" value="蟲屍" data-price="50"> 蟲屍 +50</label><br><br>
    <label><input type="checkbox" class="addon" value="輪胎油" data-price="50"> 輪胎油 +50</label><br><br>
    <label><input type="checkbox" class="addon" value="泡沫預洗" data-price="50"> 泡沫預洗 +50</label><br><br>
    <label><input type="checkbox" class="addon" value="除柏油" data-price="50"> 除柏油 +50</label><br><br>
    <label><input type="checkbox" id="vanVacuum" class="addon" value="箱型吸塵" data-price="150"> 箱型吸塵 +150</label><br><br>
    <label><input type="checkbox" class="addon" value="簡易吸塵" data-price="100"> 簡易吸塵 +100</label><br><br>
    <label><input type="checkbox" class="addon" value="除油膜" data-price="150"> 除油膜 +150</label>
  </div>

  <br>

  <div style="display:flex; align-items:center; gap:15px;">
    <span>今日是否使用：</span>
    <label><input type="radio" name="todayUse" value="yes" checked> 是</label>
    <label><input type="radio" name="todayUse" value="no"> 否</label>
  </div>

  <br><br>

  <select id="invoiceType">
    <option value="">是否開發票</option>
    <option value="Y">有開發票</option>
    <option value="N">未開發票</option>
  </select>

  <br><br>

  <div id="priceSuggest" class="info-box">
    請選擇車型與基本服務
  </div>

  <br>

  <div class="card">
    <h2>付款明細</h2>

    <input type="number" id="cashAmount" placeholder="現金金額">
    <br><br>

    <input type="number" id="linePayAmount" placeholder="LINE PAY 金額">
    <br><br>

    <input type="number" id="pxPayAmount" placeholder="全支付金額">
    <br><br>

    <div id="totalAmountBox" class="info-box">
      總收款金額：0 元
    </div>

    <br>

    <textarea id="discountReason"
      placeholder="若實收金額與建議售價不同，請填寫原因，例如：老客戶優惠、活動優惠、主管同意等"></textarea>
  </div>

  <button type="button" id="createBtn" onclick="createCard()">
    建立會員卡
  </button>

  <button type="button" onclick="location.href='vip.html'">
    返回首頁
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const storeCode = localStorage.getItem("storeCode");
const storeName = localStorage.getItem("storeName");
const staffName = localStorage.getItem("staffName");
const staffAccount = localStorage.getItem("staffAccount");

let suggestedVipPrice = 0;
let currentPackageType = "";
let isCreating = false;

if(!storeCode) {
  alert("請先登入");
  location.href = "vip-login.html";
}

document.getElementById("storeInfo").innerText =
  storeCode + " " + (storeName || "");

document.getElementById("staffInfo").innerText =
  staffName || "";

document.getElementById("vehicleType").addEventListener("change", function() {
  updateBaseServiceLimit();
  updateVanVacuumLimit();
  updateSuggest();
});

document.getElementById("packageCount").addEventListener("change", updateSuggest);

document.getElementById("baseService").addEventListener("change", function() {
  document.getElementById("quickPackage").value = "";
  updateSuggest();
});

document.getElementById("quickPackage").addEventListener("change", applyQuickPackage);

document.querySelectorAll(".addon").forEach(cb => {
  cb.addEventListener("change", function() {
    document.getElementById("quickPackage").value = "";
    updateSuggest();
  });
});

document.getElementById("cashAmount").addEventListener("input", updateTotalAmount);
document.getElementById("linePayAmount").addEventListener("input", updateTotalAmount);
document.getElementById("pxPayAmount").addEventListener("input", updateTotalAmount);

updateBaseServiceLimit();
updateVanVacuumLimit();

function resetCreateButton() {
  isCreating = false;

  const createBtn = document.getElementById("createBtn");
  createBtn.disabled = false;
  createBtn.innerText = "建立會員卡";
}

function isVanVehicle(vehicle) {
  return (
    vehicle === "箱型車" ||
    vehicle === "箱型車加大" ||
    vehicle === "箱型車特大"
  );
}

function updateBaseServiceLimit() {

  const vehicle = document.getElementById("vehicleType").value;
  const baseService = document.getElementById("baseService");
  const colorfulOption = baseService.querySelector('option[value="炫彩泡泡"]');

  if(!colorfulOption) return;

  if(isVanVehicle(vehicle)) {
    colorfulOption.disabled = true;

    if(baseService.value === "炫彩泡泡") {
      baseService.value = "";
      alert("箱型車以上不可選擇炫彩泡泡，請改選奈米鍍膜或套餐。");
    }
  } else {
    colorfulOption.disabled = false;
  }
}

function getVehicleAdd(vehicle) {
  if(vehicle === "休旅車") return 50;
  if(vehicle === "箱型車") return 100;
  if(vehicle === "箱型車加大") return 150;
  if(vehicle === "箱型車特大") return 200;
  return 0;
}

function updateVanVacuumLimit() {

  const vehicle = document.getElementById("vehicleType").value;
  const vanVacuum = document.getElementById("vanVacuum");
  const simpleVacuum = document.querySelector('.addon[value="簡易吸塵"]');

  if(!vanVacuum || !simpleVacuum) return;

  if(isVanVehicle(vehicle)) {
    vanVacuum.disabled = false;

    simpleVacuum.checked = false;
    simpleVacuum.disabled = true;
  } else {
    vanVacuum.checked = false;
    vanVacuum.disabled = true;

    simpleVacuum.disabled = false;
  }
}

function setAddonChecked(name, checked) {
  document.querySelectorAll(".addon").forEach(cb => {
    if(cb.value === name && !cb.disabled) {
      cb.checked = checked;
    }
  });
}

function setAddonDisabled(name, disabled) {
  document.querySelectorAll(".addon").forEach(cb => {
    if(cb.value === name) {
      cb.disabled = disabled;
    }
  });
}

function clearAddons() {
  document.querySelectorAll(".addon").forEach(cb => {
    cb.checked = false;
  });

  updateVanVacuumLimit();
}

function unlockCarePackageItems() {
  setAddonDisabled("蟲屍", false);
  setAddonDisabled("輪胎油", false);
  setAddonDisabled("除柏油", false);
}

function applyQuickPackage() {

  const quick = document.getElementById("quickPackage").value;

  unlockCarePackageItems();

  if(!quick) {
    updateSuggest();
    return;
  }

  document.getElementById("baseService").value = "奈米鍍膜";

  clearAddons();

  setAddonChecked("泡沫預洗", true);

  if(quick === "CARE") {

    setAddonChecked("蟲屍", true);
    setAddonChecked("輪胎油", true);
    setAddonChecked("除柏油", true);

    setAddonDisabled("蟲屍", true);
    setAddonDisabled("輪胎油", true);
    setAddonDisabled("除柏油", true);

  }

  if(quick === "C") {
    setAddonChecked("除油膜", true);
  }

  updateSuggest();
}

function getSelectedAddons() {
  const addons = [];

  document.querySelectorAll(".addon:checked").forEach(cb => {
    addons.push({
      name: cb.value,
      price: Number(cb.dataset.price || 0)
    });
  });

  return addons;
}

function buildPackageName(baseService, addons) {

  const quick = document.getElementById("quickPackage").value;

  if(quick === "CARE") {
    return "貼心套餐(蟲屍/輪胎油/除柏油任選)";
  }

  const names = [baseService].concat(addons.map(a => a.name));
  return names.join("+");
}

function updateSuggest() {

  updateBaseServiceLimit();
  updateVanVacuumLimit();

  const vehicle = document.getElementById("vehicleType").value;
  const baseService = document.getElementById("baseService").value;
  const quick = document.getElementById("quickPackage").value;
  const box = document.getElementById("priceSuggest");

  suggestedVipPrice = 0;
  currentPackageType = "";

  if(!vehicle || !baseService) {
    box.innerHTML = "請選擇車型與基本服務";
    return;
  }

  if(isVanVehicle(vehicle) && baseService === "炫彩泡泡") {
    box.innerHTML = "箱型車以上不可選擇炫彩泡泡";
    return;
  }

  const vehicleAdd = getVehicleAdd(vehicle);

  let basePrice = 280 + vehicleAdd;

  if(baseService === "奈米鍍膜") {
    basePrice += 50;
  }

  const addons = getSelectedAddons();

  let addonTotal = 0;

  addons.forEach(a => {
    addonTotal += a.price;
  });

  if(quick === "CARE") {
    addonTotal = 100;
  }

  let packageDiscount = 0;

  if(quick) {
    packageDiscount = 30;
  }

  const singlePrice =
    basePrice + addonTotal - packageDiscount;

  suggestedVipPrice =
    singlePrice * 10;

  currentPackageType =
    buildPackageName(baseService, addons);

  let quickText = "自選方案";

  if(quick === "CARE") {
    quickText = "貼心套餐";
  }

  if(quick === "C") {
    quickText = "C套餐";
  }

  box.innerHTML = `
    <div style="font-size:18px;">
      方案：
      <span style="font-weight:bold;">
        ${quickText}
      </span>
    </div>

    <div style="font-size:18px; margin-top:8px;">
      服務：
      <span style="font-weight:bold;">
        ${currentPackageType}
      </span>
    </div>

    <div style="font-size:18px; margin-top:8px;">
      單次價格：
      <span style="font-weight:bold;">
        ${singlePrice}
      </span>
      元
    </div>

    ${
      packageDiscount > 0
      ? `<div class="small-text">套餐已折抵：${packageDiscount} 元 / 次</div>`
      : ""
    }

    <div style="font-size:18px; margin-top:8px;">
      建議售價：
      <span style="
        color:#0f75bc;
        font-weight:bold;
        font-size:28px;
      ">
        ${suggestedVipPrice}
      </span>
      元
    </div>

    <div class="small-text">
      VIP 售價以 10 次計算，贈送次數不另外計價
    </div>
  `;
}

function getPaymentAmounts() {

  const cashAmount =
    Number(document.getElementById("cashAmount").value || 0);

  const linePayAmount =
    Number(document.getElementById("linePayAmount").value || 0);

  const pxPayAmount =
    Number(document.getElementById("pxPayAmount").value || 0);

  const totalAmount =
    cashAmount + linePayAmount + pxPayAmount;

  return {
    cashAmount,
    linePayAmount,
    pxPayAmount,
    totalAmount
  };
}

function updateTotalAmount() {

  const p = getPaymentAmounts();

  document.getElementById("totalAmountBox").innerHTML = `
    <b>總收款金額：</b>${p.totalAmount} 元
  `;
}

function clearSellForm() {

  document.getElementById("vehicleType").value = "";
  document.getElementById("packageCount").value = "";
  document.getElementById("baseService").value = "";
  document.getElementById("quickPackage").value = "";
  document.getElementById("invoiceType").value = "";

  document.querySelector('input[name="todayUse"][value="yes"]').checked = true;

  document.querySelectorAll(".addon").forEach(cb => {
    cb.checked = false;
    cb.disabled = false;
  });

  document.getElementById("cashAmount").value = "";
  document.getElementById("linePayAmount").value = "";
  document.getElementById("pxPayAmount").value = "";
  document.getElementById("discountReason").value = "";

  suggestedVipPrice = 0;
  currentPackageType = "";

  document.getElementById("priceSuggest").innerHTML =
    "請選擇車型與基本服務";

  document.getElementById("totalAmountBox").innerHTML =
    "總收款金額：0 元";

  updateBaseServiceLimit();
  updateVanVacuumLimit();
}

function createCard() {

  if(isCreating) return;

  const result = document.getElementById("result");

  updateSuggest();

  const vehicle = document.getElementById("vehicleType").value;
  const packageCount = document.getElementById("packageCount").value;
  const baseService = document.getElementById("baseService").value;
  const invoiceType = document.getElementById("invoiceType").value;
  const discountReason = document.getElementById("discountReason").value.trim();

  const todayUse =
    document.querySelector('input[name="todayUse"]:checked').value;

  const payment = getPaymentAmounts();

  if(!vehicle) {
    alert("請選擇車型");
    return;
  }

  if(!packageCount) {
    alert("請選擇購買方案");
    return;
  }

  if(!baseService) {
    alert("請選擇基本服務");
    return;
  }

  if(isVanVehicle(vehicle) && baseService === "炫彩泡泡") {
    alert("箱型車以上不可選擇炫彩泡泡");
    return;
  }

  if(!invoiceType) {
    alert("請選擇是否開發票");
    return;
  }

  if(!currentPackageType) {
    alert("請確認服務項目");
    return;
  }

  if(Number(payment.totalAmount) <= 0) {
    alert("請輸入付款金額，金額不可為0");
    return;
  }

  if(
    suggestedVipPrice > 0 &&
    payment.totalAmount !== suggestedVipPrice &&
    !discountReason
  ) {
    alert("實收金額與建議售價不同，請填寫優惠或異常原因");
    return;
  }

  isCreating = true;

  const createBtn = document.getElementById("createBtn");
  createBtn.disabled = true;
  createBtn.innerText = "建立中...";


  const submitPackageType = currentPackageType;
  const submitSuggestedPrice = suggestedVipPrice;

  const form = new URLSearchParams();

  form.append("type", "createCard");
  form.append("sellStore", storeCode);
  form.append("storeName", storeName || "");
  form.append("staffAccount", staffAccount || "");
  form.append("staffName", staffName || "");
  form.append("vehicleType", vehicle);
  form.append("packageCount", packageCount);
  form.append("packageType", submitPackageType);
  form.append("todayUse", todayUse);
  form.append("invoiceType", invoiceType);

  form.append("cashAmount", payment.cashAmount);
  form.append("linePayAmount", payment.linePayAmount);
  form.append("pxPayAmount", payment.pxPayAmount);
  form.append("amount", payment.totalAmount);

  form.append("suggestedPrice", submitSuggestedPrice);
  form.append("discountReason", discountReason);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {

  alert(
    "建立失敗：" +
    (data.message || "")
  );

  resetCreateButton();
  return;
}

    const invoiceText =
      invoiceType === "Y" ? "有開發票" : "未開發票";

    clearSellForm();
    resetCreateButton();

    result.innerHTML = `
      <div class="card">

        <h2>✅ 卡片建立成功</h2>

        <p><b>取卡代碼：</b>${data.cardNo}</p>
        <p><b>售卡分店：</b>${storeCode} ${storeName || ""}</p>
        <p><b>操作人員：</b>${staffName || ""}</p>
        <p><b>車型：</b>${vehicle}</p>
        <p><b>服務：</b>${submitPackageType}</p>
        <p><b>總次數：</b>${data.totalTimes}</p>
        <p><b>剩餘次數：</b>${data.remainingTimes}</p>

        <hr>

        <p><b>建議售價：</b>${submitSuggestedPrice} 元</p>
        <p><b>現金：</b>${payment.cashAmount} 元</p>
        <p><b>LINE PAY：</b>${payment.linePayAmount} 元</p>
        <p><b>全支付：</b>${payment.pxPayAmount} 元</p>
        <p><b>總收款：</b>${payment.totalAmount} 元</p>

        ${
          payment.totalAmount !== submitSuggestedPrice
          ? `<p><b>優惠/異常原因：</b>${discountReason}</p>`
          : ""
        }

        <p><b>是否開發票：</b>${invoiceText}</p>
        <p><b>進池比例：</b>${data.poolRate}</p>
        <p><b>進池金額：</b>${data.poolAmount} 元</p>
        <p><b>每次核銷價值：</b>${data.unitValue} 元</p>

        <p class="danger">
          請提供此代碼給客戶取卡
        </p>

      </div>
    `;
  })
.catch(err => {

  console.log(err);

  alert(
    "系統錯誤，請稍後再試"
  );

  resetCreateButton();

});
}

</script>

</body>
</html>
