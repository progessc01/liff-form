<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工註冊申請</title>
  <link rel="stylesheet" href="vip-style.css">
</head>
<body>

<div class="container">
  <h1>員工註冊申請</h1>

  <select id="store">
    <option value="">請選擇分店</option>
    <option value="AJ01|總店">AJ01 總店</option>
    <option value="AJ02|員林店">AJ02 員林店</option>
    <option value="AJ03|彰南店">AJ03 彰南店</option>
    <option value="AJ04|山福店">AJ04 山福店</option>
  </select>

  <br><br>

  <input id="password" type="password" placeholder="請設定個人密碼">

  <p class="small-text">找回密碼請洽總店</p>

  <input id="staffName" placeholder="請輸入姓名">

  <br><br>

  <button type="button" onclick="submitApply()">送出申請</button>

  <button type="button" onclick="location.href='vip-login.html'">
    返回登入
  </button>

  <div id="result"></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

function submitApply() {

  const storeValue = document.getElementById("store").value;
  const password = document.getElementById("password").value.trim();
  const staffName = document.getElementById("staffName").value.trim();
  const result = document.getElementById("result");

  if(!storeValue || !password || !staffName) {
    alert("請填寫完整資料");
    return;
  }

  const parts = storeValue.split("|");
  const storeCode = parts[0];
  const storeName = parts[1];

  // 帳號直接等於分店代碼
  const account = storeCode;

  result.innerHTML = "⏳ 送出中...";

  const form = new URLSearchParams();
  form.append("type", "staffRegisterApply");
  form.append("account", account);
  form.append("password", password);
  form.append("storeCode", storeCode);
  form.append("storeName", storeName);
  form.append("staffName", staffName);

  fetch(GAS_URL, {
    method:"POST",
    body:form
  })
  .then(r=>r.text())
  .then(t=>JSON.parse(t))
  .then(data=>{

    if(data.status === "EXIST") {
      result.innerHTML = "❌ 此員工已存在或已送出申請";
      return;
    }

    if(data.status !== "OK") {
      result.innerHTML = "❌ 申請失敗";
      return;
    }

    result.innerHTML = `
      <div class="card">
        <h2>✅ 申請已送出</h2>
        <p><b>分店：</b>${storeCode} ${storeName}</p>
        <p><b>姓名：</b>${staffName}</p>
        <p>請等待管理者核准</p>
      </div>
    `;
  })
  .catch(err=>{
    console.log(err);
    result.innerHTML = "❌ 系統錯誤";
  });
}
</script>

</body>
</html>
