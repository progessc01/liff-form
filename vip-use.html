<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片核銷</title>
<link rel="stylesheet" href="customer-style.css">
</head>
<body>

<div class="container">

  <h1>卡片核銷</h1>

  <div class="card">
    <p>核銷卡號：</p>
    <h2 id="cardNoText">讀取中...</h2>
  </div>

  <br>

  <select id="account">
  <option value="">請選擇分店</option>
  <option value="AJ01">AJ01 總店</option>
  <option value="AJ02">AJ02 員林店</option>
  <option value="AJ03">AJ03 彰南店</option>
  <option value="AJ04">AJ04 山福店</option>
</select>

  <br><br>

  <input type="password" id="password" placeholder="請輸入分店密碼">

  <br><br>

  <button type="button" onclick="useCard()">
    確認核銷
  </button>

  <br><br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const params = new URLSearchParams(window.location.search);
const cardNo = params.get("cardNo");

const result = document.getElementById("result");

if(!cardNo) {
  document.getElementById("cardNoText").innerText = "無卡號";
  result.innerHTML = "❌ QR CODE錯誤，沒有卡號";
} else {
  document.getElementById("cardNoText").innerText = cardNo;
}

function useCard() {

  const account = document.getElementById("account").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!cardNo) {
    alert("沒有卡號，無法核銷");
    return;
  }

  if(!account || !password) {
    alert("請輸入分店帳號與密碼");
    return;
  }

  if(!confirm("確認要核銷此卡片嗎？")) {
    return;
  }

  result.innerHTML = "⏳ 核銷中...";

  const form = new URLSearchParams();
  form.append("type", "useCard");
  form.append("cardNo", cardNo);
  form.append("account", account);
  form.append("password", password);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {
    if(data.status === "REFUND") {
  result.innerHTML = "❌ 此卡片已退款，無法使用";
  return;
}

    if(data.status === "LOGIN_ERROR") {
      result.innerHTML = "❌ 分店帳號或密碼錯誤";
      return;
    }

    if(data.status === "NOT_FOUND") {
      result.innerHTML = "❌ 查無此卡號";
      return;
    }

    if(data.status === "NO_TIMES") {
      result.innerHTML = "❌ 此卡片已無剩餘次數";
      return;
    }

    if(data.status !== "OK") {
      result.innerHTML = "❌ 核銷失敗：" + (data.message || "");
      return;
    }

    result.innerHTML = `
      <div class="card">
        <h2>✅ 核銷成功</h2>
        <p><b>卡號：</b>${data.cardNo}</p>
<p><b>使用服務：</b>${data.packageType}</p>
<p><b>核銷分店：</b>${data.storeCode} ${data.storeName}</p>
<p><b>核銷人員：</b>${data.staffName}</p>
<p><b>使用前次數：</b>${data.beforeTimes}</p>
<p><b>扣除次數：</b>1</p>
<p><b>剩餘次數：</b>${data.afterTimes}</p>
      </div>
    `;
  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "❌ 系統錯誤";
  });

}

</script>

</body>
</html>
