<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片核銷</title>
  <link rel="stylesheet" href="customer-style.css">
</head>
<body>

<div class="container">

  <h1>卡片核銷</h1>

  <div id="mainArea">

    <div class="card">
      <p>核銷卡號：</p>
      <h2 id="cardNoText">讀取中...</h2>

      <div id="cardInfo" style="margin-top:15px;">
        ⏳ 讀取卡片資料中...
      </div>
    </div>

    <br>

    <select id="storeCode">
      <option value="">請選擇分店</option>
      <option value="AJ01">AJ01 總店</option>
      <option value="AJ02">AJ02 員林店</option>
      <option value="AJ03">AJ03 彰南店</option>
      <option value="AJ04">AJ04 山福店</option>
    </select>

    <br><br>

    <input
      type="text"
      id="staffNo"
      placeholder="請輸入工號，例如：001"
      inputmode="numeric"
      autocomplete="off"
    >

    <br><br>

    <input
      type="password"
      id="password"
      placeholder="請輸入密碼"
      autocomplete="current-password"
      inputmode="text"
    >

    <br><br>

    <button type="button" id="useBtn" onclick="useCard('no')">
      確認核銷
    </button>

  </div>

  <br>

  <div id="result"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCWQyCyLRaKtp_7g_IkxdSorfqChbh22mbP9c5ybjKzz35yMkWUDALTEbdB5qqV96KA/exec";

const params = new URLSearchParams(window.location.search);
const cardNo = params.get("cardNo");

const result = document.getElementById("result");
const mainArea = document.getElementById("mainArea");
const cardInfo = document.getElementById("cardInfo");

let isUsing = false;

if(!cardNo) {
  document.getElementById("cardNoText").innerText = "無卡號";
  cardInfo.innerHTML = "";
  result.innerHTML = "❌ QR CODE錯誤，沒有卡號";
} else {
  document.getElementById("cardNoText").innerText = cardNo;
  loadCardInfo();
}

function loadCardInfo() {

  const form = new URLSearchParams();

  form.append("type", "searchCard");
  form.append("cardNo", cardNo);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status !== "OK") {
      cardInfo.innerHTML = `
        <div style="color:red; font-weight:bold;">
          ❌ 查無此卡號
        </div>
      `;
      return;
    }

    const card = data.card || {};

    let statusText = card.status || "";

    if(statusText === "SOLD") statusText = "可使用";
    if(statusText === "FINISHED") statusText = "已用完";
    if(statusText === "REFUND") statusText = "已退款";
    if(statusText === "VOID") statusText = "已作廢";

    let remainingTimes = Number(card.remainingTimes || 0);

    if(card.status === "VOID" || card.status === "REFUND") {
      remainingTimes = 0;
    }

    cardInfo.innerHTML = `
      <div style="
        background:rgba(0,217,255,0.12);
        border:2px solid #00d9ff;
        border-radius:16px;
        padding:16px;
        margin-top:15px;
        text-align:center;
      ">

        <div style="font-size:15px; color:#9fdfff;">
          本卡適用車型
        </div>

        <div style="
          font-size:34px;
          font-weight:bold;
          color:#ffffff;
          margin-top:6px;
        ">
          ${card.vehicleType || "未設定"}
        </div>

        <hr style="border-color:rgba(255,255,255,0.2);">

        <div style="font-size:15px; color:#9fdfff;">
          使用服務
        </div>

        <div style="
          font-size:26px;
          font-weight:bold;
          color:#f7d774;
          margin-top:6px;
          line-height:1.4;
        ">
          ${card.packageType || "未設定"}
        </div>

        <hr style="border-color:rgba(255,255,255,0.2);">

        <div style="font-size:18px; font-weight:bold;">
          剩餘次數：${remainingTimes} / ${card.totalTimes || ""}
        </div>

        <div style="
          margin-top:8px;
          font-size:16px;
          font-weight:bold;
          color:${
            card.status === "SOLD" ? "#00ff99" :
            card.status === "VOID" || card.status === "REFUND" || card.status === "FINISHED" ? "#ff5555" :
            "#ffcc00"
          };
        ">
          狀態：${statusText}
        </div>

      </div>
    `;

  })
  .catch(err => {
    console.log(err);
    cardInfo.innerHTML = "❌ 卡片資料讀取失敗";
  });
}

function resetUseButton() {
  isUsing = false;

  const btn = document.getElementById("useBtn");
  if(btn) {
    btn.disabled = false;
    btn.innerText = "確認核銷";
  }
}

function lockUseButton() {
  isUsing = true;

  const btn = document.getElementById("useBtn");
  if(btn) {
    btn.disabled = true;
    btn.innerText = "核銷中...";
  }
}

function buildAccount(storeCode, staffNo) {

  staffNo = String(staffNo || "")
    .trim()
    .replace(/\s/g, "");

  if(!staffNo) return "";

  if(staffNo.includes("-")) {
    return staffNo.toUpperCase();
  }

  return storeCode + "-" + staffNo;
}

function clearAfterSuccess() {

  mainArea.innerHTML = `
    <div class="card">
      <h2>✅ 核銷完成</h2>
      <p style="color:#ccc;">
        此頁面已清空，請勿重複操作。
      </p>
    </div>
  `;
}

function useCard(allowDuplicate) {

  if(isUsing) return;

  const storeCode = document.getElementById("storeCode").value.trim();
  const staffNo = document.getElementById("staffNo").value.trim();
  const password = document.getElementById("password").value.trim();

  const account = buildAccount(storeCode, staffNo);

  allowDuplicate = allowDuplicate || "no";

  if(!cardNo) {
    alert("沒有卡號，無法核銷");
    return;
  }

  if(!storeCode) {
    alert("請選擇分店");
    return;
  }

  if(!staffNo) {
    alert("請輸入工號");
    return;
  }

  if(!password) {
    alert("請輸入密碼");
    return;
  }

  if(allowDuplicate !== "yes") {
    if(!confirm("確認要核銷此卡片嗎？")) {
      return;
    }
  }

  lockUseButton();

  result.innerHTML = "⏳ 核銷中...";

  const form = new URLSearchParams();

  form.append("type", "useCard");
  form.append("cardNo", cardNo);
  form.append("account", account);
  form.append("password", password);
  form.append("allowDuplicate", allowDuplicate);

  fetch(GAS_URL, {
    method: "POST",
    body: form
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(data => {

    if(data.status === "NEED_CONFIRM") {

      resetUseButton();

      if(confirm("此卡片剛剛已核銷過，確定要再次核銷嗎？")) {
        useCard("yes");
      } else {
        result.innerHTML = "已取消連續核銷";
      }

      return;
    }

    if(data.status === "REFUND") {
      result.innerHTML = "❌ 此卡片已退款，無法使用";
      resetUseButton();
      return;
    }

    if(data.status === "LOGIN_ERROR") {
      result.innerHTML = "❌ 分店、工號或密碼錯誤";
      resetUseButton();
      return;
    }

    if(data.status === "NOT_FOUND") {
      result.innerHTML = "❌ 查無此卡號";
      resetUseButton();
      return;
    }

    if(data.status === "NO_TIMES") {
      result.innerHTML = "❌ 此卡片已無剩餘次數";
      resetUseButton();
      return;
    }

    if(data.status === "VOID") {
      result.innerHTML = "❌ 此卡片已作廢，無法使用";
      resetUseButton();
      return;
    }

    if(data.status !== "OK") {
      result.innerHTML = "❌ 核銷失敗：" + (data.message || "");
      resetUseButton();
      return;
    }

    clearAfterSuccess();

    result.innerHTML = `
      <div class="card">
        <h2>✅ 核銷成功</h2>
        <p><b>卡號：</b>${data.cardNo}</p>
        <p><b>使用服務：</b>${data.packageType}</p>
        <p><b>核銷分店：</b>${data.storeCode} ${data.storeName}</p>
        <p><b>核銷人員：</b>${data.staffName}</p>
        <p><b>扣除次數：</b>1</p>
        <p><b>剩餘次數：</b>${data.afterTimes}</p>
        <p style="color:red; font-weight:bold;">
          畫面已清空，請勿重複核銷。
        </p>
      </div>
    `;

    setTimeout(() => {
      result.innerHTML = `
        <div class="card">
          <h2>✅ 核銷完成</h2>
          <p>資料已清空，請關閉此頁面。</p>
        </div>
      `;
    }, 3000);

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "❌ 系統錯誤";
    resetUseButton();
  });

}

</script>

</body>
</html>
